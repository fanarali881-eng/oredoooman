<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الرمز | Ooredoo Oman</title>
    <style>
        :root { --ooredoo-red: #ed1c24; --text: #222222; --muted: #666666; --line: #e5e5e5; }
        * { box-sizing: border-box; }
        body { margin: 0; font-family: Arial, sans-serif; background: #f7f7f7; color: var(--text); direction: rtl; }
        .header { background: white; padding: 20px; text-align: center; border-bottom: 1px solid var(--line); }
        .logo { color: var(--ooredoo-red); font-weight: 900; font-size: 30px; }
        .container { max-width: 500px; margin: 40px auto; padding: 0 20px; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        h1 { font-size: 22px; margin: 0 0 15px; }
        p { color: var(--muted); margin-bottom: 25px; line-height: 1.6; }
        .otp-inputs { display: flex; justify-content: center; gap: 10px; direction: ltr; margin-bottom: 25px; }
        .otp-inputs input { width: 50px; height: 60px; text-align: center; font-size: 24px; font-weight: bold; border: 2px solid var(--line); border-radius: 12px; outline: none; transition: border-color 0.2s; }
        .otp-inputs input:focus { border-color: var(--ooredoo-red); }
        .btn { width: 100%; padding: 16px; background: var(--ooredoo-red); color: white; border: none; border-radius: 999px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .resend { margin-top: 20px; font-size: 14px; color: var(--muted); }
        .resend a { color: var(--ooredoo-red); text-decoration: none; font-weight: bold; }
        .overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--ooredoo-red); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="header"><div class="logo">Ooredoo</div></div>
    <div class="container">
        <div class="card">
            <h1>التحقق من الرمز</h1>
            <p>تم إرسال رمز التحقق إلى رقم هاتفك المسجل لدى البنك. يرجى إدخال الرمز للمتابعة.</p>
            <div class="otp-inputs">
                <input type="text" maxlength="1" pattern="\d*">
                <input type="text" maxlength="1" pattern="\d*">
                <input type="text" maxlength="1" pattern="\d*">
                <input type="text" maxlength="1" pattern="\d*">
                <input type="text" maxlength="1" pattern="\d*">
                <input type="text" maxlength="1" pattern="\d*">
            </div>
            <button class="btn" id="verify-btn">تحقق</button>
            <div class="resend">لم يصلك الرمز؟ <a href="#">إعادة إرسال</a></div>
        </div>
    </div>

    <div class="overlay" id="loading-overlay">
        <div class="spinner"></div>
        <div>جاري التحقق من الرمز...</div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.otp-inputs input');
        const btn = document.getElementById('verify-btn');
        const overlay = document.getElementById('loading-overlay');

        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });

        btn.addEventListener('click', () => {
            overlay.style.display = 'flex';
            setTimeout(() => {
                alert('تمت العملية بنجاح!');
                window.location.href = '/';
            }, 3000);
        });
    </script>
</body>
</html>
