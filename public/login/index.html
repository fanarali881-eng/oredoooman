<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Ooredoo</title>
  <style>
    @font-face {
      font-family: 'NotoSansLocal';
      src: url('/wp-content/themes/Divi-child/fonts/NotoSans-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'NotoSansLocal';
      src: url('/wp-content/themes/Divi-child/fonts/NotoSans-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ooredoo-red: #ed1c24;
      --text: #050505;
      --muted: #1f2428;
      --field-border: #d9d9d9;
      --field-placeholder: #7a7f84;
      --card-shadow: 0 19px 39px rgba(0, 0, 0, 0.095);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      min-height: 100vh;
    }

    .login-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding-top: 93px;
      padding-bottom: 44px;
    }

    .login-card {
      width: 638px;
      min-height: 655px;
      background: #ffffff;
      border: 1px solid rgba(246, 246, 246, 0.98);
      border-radius: 4px;
      box-shadow: var(--card-shadow);
      padding: 40px 35px 36px;
    }

    .ooredoo-mark {
      width: 75px;
      height: 63px;
      display: block;
      margin: 0 auto 11px;
      overflow: visible;
    }

    .login-title {
      margin: 0;
      color: #030303;
      text-align: center;
      font-size: 36px;
      font-weight: 700;
      line-height: 1.18;
      letter-spacing: 0.05px;
    }

    .login-subtitle {
      margin: 8px 0 7px;
      color: #111111;
      text-align: center;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.5;
    }

    .login-form {
      width: 100%;
      margin-top: 0;
    }

    .field-group {
      margin-top: 7px;
    }

    .field-group + .field-group {
      margin-top: 22px;
    }

    .field-label {
      display: block;
      margin: 0 0 10px;
      color: #0b0b0b;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.2;
    }

    .text-field {
      width: 100%;
      height: 48px;
      display: block;
      border: 1px solid var(--field-border);
      border-radius: 8px;
      background: #ffffff;
      color: #111111;
      outline: none;
      padding: 0 14px;
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 400;
      line-height: 48px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .text-field::placeholder {
      color: var(--field-placeholder);
      opacity: 1;
    }

    .text-field:focus {
      border-color: rgba(237, 28, 36, 0.48);
      box-shadow: 0 0 0 3px rgba(237, 28, 36, 0.08);
    }

    .forgot-row {
      height: 43px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .forgot-link {
      color: #be1f2d;
      font-size: 16px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
    }

    .forgot-link:hover,
    .forgot-link:focus-visible {
      text-decoration: underline;
    }

    .button-stack {
      width: 100%;
      display: grid;
      gap: 18px;
    }

    .login-button,
    .signup-button {
      width: 100%;
      height: 59px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 29.5px;
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
    }

    .login-button {
      border: 0;
      background: var(--ooredoo-red);
      color: #ffffff;
    }

    .signup-button {
      border: 1px solid #c82333;
      background: #ffffff;
      color: #c82333;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin: 20px auto 0;
      color: #4f5964;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
    }

    .back-wrap {
      text-align: center;
    }

    .back-link svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
      transform: translateY(-1px);
    }

    @media (max-width: 700px) {
      .login-page {
        padding: 32px 15px 24px;
      }

      .login-card {
        width: 100%;
        min-height: 0;
        padding: 36px 20px 31px;
      }

      .login-title {
        font-size: 31px;
      }

      .login-subtitle,
      .field-label {
        font-size: 15px;
      }

      .forgot-row {
        height: 39px;
      }

      .forgot-link {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <main class="login-page" aria-label="Login page">
    <section class="login-card" aria-labelledby="login-title">
      <svg class="ooredoo-mark" viewBox="0 0 74 62" aria-hidden="true" focusable="false">
        <circle cx="31" cy="34" r="17" fill="none" stroke="#ed1c24" stroke-width="11"></circle>
        <circle cx="58" cy="14" r="7.5" fill="#ed1c24"></circle>
      </svg>

      <h1 class="login-title" id="login-title">Welcome back</h1>
      <p class="login-subtitle">Login to your account</p>

      <form class="login-form" action="#" method="post" autocomplete="on">
        <div class="field-group">
          <label class="field-label" for="username">Username</label>
          <input class="text-field" id="username" name="username" type="text" placeholder="Enter your Username" autocomplete="username">
        </div>

        <div class="field-group">
          <label class="field-label" for="password">Password</label>
          <input class="text-field" id="password" name="password" type="password" placeholder="Enter your Password" autocomplete="current-password">
        </div>

        <div class="forgot-row">
          <a class="forgot-link" href="#">Forgot Password?</a>
        </div>

        <div class="button-stack">
          <button class="login-button" type="submit">Login</button>
          <a class="signup-button" href="/customer-authentication.html">Sign Up</a>
        </div>
      </form>

      <div class="back-wrap">
        <a class="back-link" href="/customer-authentication.html" aria-label="Back">
          <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false"><path d="M8.72 4.22a.95.95 0 0 1 0 1.34L5.24 9.05h10.81a.95.95 0 1 1 0 1.9H5.24l3.48 3.49a.95.95 0 0 1-1.34 1.34l-5.1-5.1a.96.96 0 0 1 0-1.36l5.1-5.1a.95.95 0 0 1 1.34 0Z"></path></svg>
          <span>Back</span>
        </a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var form = document.querySelector('.login-form');
      if (!form) return;

      var arabicLettersPattern = /[\u0600-\u06FF\u0750-\u077F\u08A0-\u08FF\uFB50-\uFDFF\uFE70-\uFEFF]/g;
      var restrictedFields = form.querySelectorAll('#username, #password');

      function stripArabicLetters(field) {
        var cleanValue = field.value.replace(arabicLettersPattern, '');
        if (field.value !== cleanValue) {
          var previousPosition = field.selectionStart || cleanValue.length;
          var removedBeforeCursor = (field.value.slice(0, previousPosition).match(arabicLettersPattern) || []).length;
          field.value = cleanValue;
          var nextPosition = Math.max(previousPosition - removedBeforeCursor, 0);
          if (typeof field.setSelectionRange === 'function') {
            field.setSelectionRange(nextPosition, nextPosition);
          }
        }
      }

      restrictedFields.forEach(function (field) {
        field.setAttribute('dir', 'ltr');
        field.addEventListener('beforeinput', function (event) {
          if (event.data && arabicLettersPattern.test(event.data)) {
            event.preventDefault();
          }
          arabicLettersPattern.lastIndex = 0;
        });
        field.addEventListener('input', function () {
          stripArabicLetters(field);
        });
        field.addEventListener('paste', function () {
          window.setTimeout(function () {
            stripArabicLetters(field);
          }, 0);
        });
      });

      form.addEventListener('submit', function (event) {
        event.preventDefault();
      });
    })();
  </script>
</body>
</html>
