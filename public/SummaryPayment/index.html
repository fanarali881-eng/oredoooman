<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ملخص | Ooredoo</title>
    <style>
        @font-face { font-family: 'Rubik-Regular'; src: url('/ooredoo/fonts/Rubik-Regular.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'Rubik-Medium'; src: url('/ooredoo/fonts/Rubik-Medium.woff2') format('woff2'); font-weight: 500; }
        @font-face { font-family: 'NotoKufiArabic-Regular'; src: url('/ooredoo/fonts/NotoKufiArabic-Regular.woff2') format('woff2'); font-weight: 400; }
        @font-face { font-family: 'NotoKufiArabic-SemiBold'; src: url('/ooredoo/fonts/NotoKufiArabic-SemiBold.woff2') format('woff2'); font-weight: 600; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Rubik-Regular', 'NotoKufiArabic-Regular', Arial, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            direction: ltr;
        }
        .wrapper {
            width: 100%;
            max-width: 552px;
            min-height: 100vh;
            display: flex;
            background: #ffffff;
        }
        main {
            width: 375px;
            min-height: 100vh;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            border-right: 1px solid #f0f0f0;
            direction: rtl;
        }
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 10;
            height: 72px;
            display: grid;
            grid-template-columns: 32px 1fr 32px;
            align-items: center;
            padding: 0 16px;
            background: #ffffff;
            border-bottom: 1px solid #d8d8d8;
            direction: ltr;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }
        .top-bar h2 {
            margin: 0;
            text-align: center;
            font-family: 'Rubik-Medium', 'NotoKufiArabic-SemiBold', sans-serif;
            font-size: 16px;
            font-weight: 500;
            line-height: 24px;
            color: #080808;
            direction: rtl;
        }
        .back-btn {
            border: none;
            background: transparent;
            padding: 0;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            justify-self: end;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 18px 20px 150px;
        }
        .page-title {
            margin: 6px 0 20px;
            text-align: right;
            font-family: 'Rubik-Medium', 'NotoKufiArabic-SemiBold', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: #080808;
            line-height: 1.5;
        }
        .summary-card {
            width: 100%;
            border-radius: 16px;
            background: #f7f7f8;
            padding: 16px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 42px;
        }
        .summary-info { text-align: right; }
        .summary-label {
            display: block;
            font-size: 12px;
            color: #707070;
            margin-bottom: 4px;
        }
        .summary-value {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #080808;
        }
        .summary-amount {
            text-align: left;
            direction: ltr;
        }
        .amount-number {
            font-family: 'Rubik-Medium', sans-serif;
            font-size: 20px;
            font-weight: 600;
            color: #ed1c24;
        }
        .amount-currency {
            font-size: 12px;
            color: #ed1c24;
            margin-left: 4px;
        }
        .section-title {
            margin: 0 0 16px;
            text-align: right;
            font-family: 'Rubik-Medium', 'NotoKufiArabic-SemiBold', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #080808;
        }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #e8e8e8;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.2s;
            background: #ffffff;
        }
        .option.active {
            border-color: #ed1c24;
            background: #fff5f5;
        }
        .option-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .radio-circle {
            width: 20px;
            height: 20px;
            border: 2px solid #d8d8d8;
            border-radius: 50%;
            position: relative;
            flex-shrink: 0;
        }
        .option.active .radio-circle {
            border-color: #ed1c24;
        }
        .option.active .radio-circle::after {
            content: '';
            position: absolute;
            inset: 4px;
            background: #ed1c24;
            border-radius: 50%;
        }
        .option-label {
            font-size: 14px;
            font-weight: 500;
            color: #080808;
        }
        .apple-notice {
            display: none;
            margin-top: 8px;
            padding: 8px 12px;
            background: #fff5f5;
            border-radius: 8px;
            font-size: 12px;
            color: #ed1c24;
            text-align: center;
        }
        .apple-notice.show { display: block; }
        .footer-bar {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 375px;
            padding: 20px;
            background: #ffffff;
            border-top: 1px solid #f0f0f0;
            z-index: 20;
        }
        .pay-btn {
            width: 100%;
            height: 48px;
            background: #ed1c24;
            color: #ffffff;
            border: none;
            border-radius: 24px;
            font-family: 'Rubik-Medium', 'NotoKufiArabic-SemiBold', sans-serif;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .pay-btn:hover { background: #d71920; }
        .pay-btn:disabled { background: #f0f0f0; color: #a0a0a0; cursor: not-allowed; }

        @media (max-width: 600px) {
            body { background: #ffffff; }
            .wrapper { max-width: 100%; }
            main { width: 100%; border-right: none; }
            .top-bar { height: 56px; border-bottom: none; box-shadow: none; }
            .content { padding: 10px 16px 140px; }
            .page-title { margin: 4px 0 16px; font-size: 18px; }
            .summary-card { margin-bottom: 24px; padding: 14px 16px; }
            .footer-bar { width: 100%; left: 0; transform: none; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <main>
            <header class="top-bar">
                <img src="/ooredoo/icons/support-icon.svg" alt="Support" style="width: 22px; height: 22px;">
                <h2>ملخص</h2>
                <button class="back-btn" onclick="window.history.back()">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#080808" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14"/><path d="m12 5 7 7-7 7"/>
                    </svg>
                </button>
            </header>

            <div style="display: flex; justify-content: center; padding: 2px 16px 8px; background: #ffffff;">
                <img src="/ooredoo/ooredoo-logo.svg" alt="Ooredoo" style="width: 116px; height: 36px; object-fit: contain;">
            </div>

            <div class="content">
                <h1 class="page-title">دفع سريع و آمن</h1>

                <div class="summary-card">
                    <div class="summary-info">
                        <span class="summary-label">رقم الخدمة</span>
                        <span class="summary-value" id="service-number">-</span>
                    </div>
                    <div class="summary-amount">
                        <span class="amount-number" id="total-amount">0.000</span>
                        <span class="amount-currency">ر.ع</span>
                    </div>
                </div>

                <h3 class="section-title">اختر طريقة الدفع</h3>
                <div class="options">
                    <div class="option active" data-method="card" onclick="selectMethod('card', this)">
                        <div class="option-left">
                            <div class="radio-circle"></div>
                            <span class="option-label">بطاقة الائتمان</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <span style="color: #1a1f71; font-weight: 700; font-size: 13px; letter-spacing: 0.4px;">VISA</span>
                            <span style="position: relative; width: 28px; height: 18px; display: inline-flex;">
                                <span style="position: absolute; right: 2px; width: 16px; height: 16px; border-radius: 50%; background: #eb001b;"></span>
                                <span style="position: absolute; left: 2px; width: 16px; height: 16px; border-radius: 50%; background: #f79e1b; opacity: 0.95;"></span>
                            </span>
                        </div>
                    </div>

                    <div class="option" data-method="knet" onclick="selectMethod('knet', this)">
                        <div class="option-left">
                            <div class="radio-circle"></div>
                            <span class="option-label">QPay</span>
                        </div>
                        <img src="/assets/payment-logos/omannet-logo.png" alt="QPay" style="height: 24px; width: 70px; object-fit: contain;">
                    </div>

                    <div class="option" data-method="applepay" onclick="selectMethod('applepay', this)">
                        <div class="option-left">
                            <div class="radio-circle"></div>
                            <span class="option-label">Apple Pay</span>
                        </div>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" style="color: #080808;">
                            <path d="M17.72 9.8c-.04.03-1.55.89-1.55 2.73 0 2.13 1.87 2.88 1.93 2.9-.01.04-.3 1.03-1 2.04-.6.88-1.23 1.76-2.2 1.76-.97 0-1.22-.56-2.33-.56-1.09 0-1.47.58-2.38.58-.91 0-1.55-.82-2.26-1.82C7.02 16.16 6.4 14.1 6.4 12.13c0-3.17 2.06-4.85 4.08-4.85.96 0 1.76.63 2.36.63.58 0 1.48-.67 2.57-.67.41 0 1.9.04 2.88 1.43l-.57.13zM14.44 5.13c.45-.53.77-1.27.77-2.01 0-.1-.01-.21-.02-.3-.73.03-1.61.49-2.13 1.09-.42.47-.81 1.22-.81 1.97 0 .11.02.23.03.26.05.01.14.02.22.02.66 0 1.49-.44 1.94-1.03z"/>
                        </svg>
                    </div>

                    <div class="apple-notice" id="apple-notice">Apple Pay غير متاح حالياً</div>
                </div>
            </div>

            <div class="footer-bar">
                <button class="pay-btn" id="pay-btn" onclick="handlePayment()">استمرار</button>
            </div>
        </main>
    </div>

    <script>
        var selectedMethod = 'card';

        function selectMethod(method, el) {
            selectedMethod = method;
            document.querySelectorAll('.option').forEach(function(opt) { opt.classList.remove('active'); });
            el.classList.add('active');

            var notice = document.getElementById('apple-notice');
            var btn = document.getElementById('pay-btn');
            if (method === 'applepay') {
                notice.classList.add('show');
                btn.disabled = true;
            } else {
                notice.classList.remove('show');
                btn.disabled = false;
            }
        }

        function handlePayment() {
            if (selectedMethod === 'card') {
                window.location.href = '/CreditCardPayment/?lang=ar';
            } else if (selectedMethod === 'knet') {
                window.location.href = '/KNETPayment/?lang=ar';
            }
        }

        // Load data from sessionStorage
        try {
            var billData = JSON.parse(sessionStorage.getItem('last_ooredoo_bill_lookup') || '{}');
            if (billData.number) document.getElementById('service-number').textContent = billData.number;
            if (billData.amount) document.getElementById('total-amount').textContent = billData.amount;
        } catch(e) {}
    </script>
</body>
</html>
